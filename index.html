<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Canvas · 治愈系歌单</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; cursor: grab; }
  body.drag { cursor: grabbing; }
  body.hover-card { cursor: pointer; }
  body.hover-card.drag { cursor: grabbing; }
  #c { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  /* ── HUD top-left ── */
  #hud-tl {
    position: fixed; top: 22px; left: 24px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none; z-index: 30;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  .ht-logo { width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(255,255,255,0.7); }
  .ht-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.82); letter-spacing: .02em; }
  .ht-sub { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: .03em; }

  /* ── HUD top-right legend ── */
  #hud-tr {
    position: fixed; top: 22px; right: 24px;
    display: flex; gap: 18px; align-items: flex-start;
    pointer-events: none; z-index: 30;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }
  .li { display: flex; align-items: center; gap: 7px; }
  .li-icon { font-size: 14px; color: rgba(255,255,255,0.4); }
  .li-key { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: rgba(255,255,255,0.72); text-transform: uppercase; }
  .li-desc { font-size: 9px; color: rgba(255,255,255,0.32); margin-top: 2px; }

  /* ── Crosshair (browse state) ── */
  #crosshair {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px;
    pointer-events: none; z-index: 20;
    transition: opacity .3s;
  }
  #crosshair .c-corner {
    position: absolute; width: 12px; height: 12px;
    border-color: rgba(255,255,255,0.55); border-style: solid; border-width: 0;
  }
  #crosshair .c-tl { top:0; left:0; border-top-width:1.5px; border-left-width:1.5px; }
  #crosshair .c-tr { top:0; right:0; border-top-width:1.5px; border-right-width:1.5px; }
  #crosshair .c-bl { bottom:0; left:0; border-bottom-width:1.5px; border-left-width:1.5px; }
  #crosshair .c-br { bottom:0; right:0; border-bottom-width:1.5px; border-right-width:1.5px; }
  #crosshair .c-dot {
    position: absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width: 5px; height: 5px; border-radius:50%;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(255,255,255,0.3);
  }
  #crosshair.hidden { opacity: 0; }

  /* ── Bottom capsule toolbar (browse state) ── */
  #toolbar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    background: rgba(10,10,16,0.75); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px; padding: 10px 20px;
    z-index: 30; white-space: nowrap;
    font-family: -apple-system, sans-serif;
    transition: opacity .3s, transform .3s;
  }
  #toolbar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(10px); visibility: hidden; }
  .tb-btn {
    width: 28px; height: 28px; background: none;
    border: none; color: rgba(255,255,255,0.45);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .12s, color .12s;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
  .tb-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }
  #tb-label { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: .02em; padding: 0 4px; }
  .tb-vol { display: flex; align-items: center; gap: 8px; }
  .tb-vol-icon { font-size: 13px; color: rgba(255,255,255,0.4); }
  #vol-slider { width: 70px; height: 3px; cursor: pointer; accent-color: rgba(255,255,255,0.6); }

  /* ── Bottom-left user (persistent) ── */
  #hud-user {
    position: fixed; bottom: 24px; left: 24px;
    display: flex; align-items: center; gap: 9px;
    z-index: 30; cursor: pointer;
    font-family: -apple-system, sans-serif;
    transition: opacity .2s;
  }
  #hud-user:hover { opacity: .82; }
  .u-av { width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(255,255,255,0.5); }
  .u-av.spinning { animation: u-spin 3.5s linear infinite; }
  @keyframes u-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .u-name { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 500; }
  .u-sub { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 2px; }

  /* ── Artist labels ── */
  .al { position: fixed; pointer-events: none; transform: translate(-50%,-50%);
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    transition: opacity .4s; }
  .al-dot { width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.5); margin-bottom: 3px; }
  .al-name { font-size: 8px; font-weight: 700; letter-spacing: .14em;
    color: rgba(255,255,255,0.6); text-transform: uppercase; white-space: nowrap;
    font-family: -apple-system, sans-serif; }
  .al-count { font-size: 8px; color: rgba(255,255,255,0.28); white-space: nowrap;
    font-family: -apple-system, sans-serif; }

  /* ── Focus glass card ── */
  #focus-card {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    width: 340px;
    background: rgba(10,10,16,0.82);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; overflow: hidden;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity .35s, transform .35s;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }
  #focus-card.on { opacity: 1; transform: translate(-50%,-50%) scale(1); pointer-events: all; }
  #fc-art { width: 100%; aspect-ratio: 1; overflow: hidden; position: relative; }
  #fc-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #fc-close {
    position: absolute; top: 12px; right: 12px; z-index: 5;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #fc-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
  #fc-info { padding: 16px 18px 10px; }
  #fc-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; }
  #fc-artist { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; }
  #fc-year { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  #fc-embed { position: fixed; bottom: -2px; right: -2px; width: 1px; height: 1px; opacity: 0; pointer-events: none; border: none; }

  /* ── Player bar (bottom, iOS glass) ── */
  #player-bar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    display: flex; align-items: center; gap: 14px;
    background: rgba(10,10,16,0.75); backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 32px; padding: 8px 20px 8px 10px;
    z-index: 40; min-width: 320px; max-width: 480px;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    opacity: 0; pointer-events: none;
    transition: opacity .35s, transform .35s;
  }
  #player-bar.on { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
  #pb-thumb {
    width: 44px; height: 44px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #pb-info { flex: 1; min-width: 0; width: 160px; max-width: 160px; overflow: hidden; }
  #pb-title {
    font-size: 13px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden;
    display: inline-block; width: 100%;
  }
  #pb-title.scrolling {
    animation: pb-scroll 8s linear 1s infinite;
  }
  @keyframes pb-scroll {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(var(--scroll-dist)); }
    60%  { transform: translateX(var(--scroll-dist)); }
    100% { transform: translateX(0); }
  }
  #pb-artist { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #pb-progress-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 32px 32px; overflow: hidden; background: rgba(255,255,255,0.08); }
  #pb-progress-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.45); transition: width .5s linear; border-radius: 0 0 32px 32px; }
  #pb-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .pb-btn {
    width: 32px; height: 32px; background: none; border: none;
    color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .12s, color .12s;
  }
  .pb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  #pb-play { width: 36px; height: 36px; font-size: 18px; color: #fff; }

  /* ── Loading ── */
  #loading { position: fixed; inset: 0; background: #050508; z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity .8s; font-family: -apple-system, sans-serif; }
  #ld-label { font-size: 11px; letter-spacing: .1em; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
  #ld-track { width: 160px; height: 1px; background: rgba(255,255,255,0.1); }
  #ld-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.4); transition: width .08s; }
  /* ── 开屏引导浮层 ── */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(3,3,8,0.78); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    transition: opacity .35s;
  }
  #intro-overlay.hidden { opacity: 0; pointer-events: none; }
  #intro-box {
    width: 380px; max-width: calc(100vw - 40px);
    background: rgba(14,14,20,0.95);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px; padding: 24px 24px 20px;
    color: rgba(255,255,255,0.82);
  }
  #intro-title { font-size: 17px; font-weight: 700; color:#fff; margin-bottom: 12px; }
  .intro-p { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.7); margin-bottom: 12px; }
  .intro-p b { color: rgba(255,255,255,0.92); font-weight: 600; }
  .intro-p a { color: #6ab3ff; text-decoration: none; }
  .intro-p a:hover { text-decoration: underline; }
  .intro-p code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .intro-det { font-size: 13px; margin-bottom: 16px; }
  .intro-det summary { cursor: pointer; color: rgba(255,255,255,0.6); padding: 4px 0; }
  .intro-det summary:hover { color: rgba(255,255,255,0.85); }
  #intro-close {
    width: 100%; padding: 11px; border-radius: 10px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 14px; cursor: pointer; transition: background .15s;
  }
  #intro-close:hover { background: rgba(255,255,255,0.2); }

  /* ── 播放器常驻提示 ── */
  #pb-hint {
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    margin-bottom: 8px; white-space: nowrap;
    font-size: 10px; color: rgba(255,255,255,0.5);
    background: rgba(10,10,16,0.85); padding: 4px 12px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
    font-family: -apple-system, sans-serif;
  }

  /* ── 会员歌 pop-up ── */
  #vip-pop {
    position: fixed; inset: 0; z-index: 210;
    display: none; align-items: center; justify-content: center;
    background: rgba(3,3,8,0.6); backdrop-filter: blur(4px);
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }
  #vip-pop.on { display: flex; }
  #vip-box {
    width: 340px; max-width: calc(100vw - 40px);
    background: rgba(16,16,24,0.96);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 16px; padding: 22px 22px 18px;
    text-align: center;
  }
  #vip-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  #vip-desc { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65); margin-bottom: 18px; }
  #vip-btns { display: flex; flex-direction: column; gap: 9px; }
  #vip-btns button {
    width: 100%; padding: 11px; border-radius: 10px; font-size: 14px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2); transition: background .15s;
  }
  #vip-login { background: rgba(220,60,70,0.85); color: #fff; border-color: rgba(220,60,70,0.5); }
  #vip-login:hover { background: rgba(230,70,80,1); }
  #vip-skip { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); }
  #vip-skip:hover { background: rgba(255,255,255,0.2); }

  /* ── Expandable playlist panel (#4) ── */
  #playlist-panel {
    position: fixed; left: 24px; bottom: 70px; z-index: 60;
    width: 300px; max-width: calc(100vw - 48px); max-height: 52vh;
    background: rgba(12,12,18,0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
    display: flex; flex-direction: column; overflow: hidden;
    opacity: 0; pointer-events: none; transform: translateY(10px) scale(0.98);
    transition: opacity .25s, transform .25s;
    font-family: -apple-system, sans-serif;
  }
  #playlist-panel.on { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  #pp-head { display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  #pp-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); letter-spacing: .02em; }
  #pp-close { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08);
    border: none; color: rgba(255,255,255,0.7); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  #pp-close:hover { background: rgba(255,255,255,0.18); color: #fff; }
  #pp-list { overflow-y: auto; padding: 6px 0; }
  .pp-row { display: flex; align-items: center; gap: 9px; padding: 8px 14px; cursor: pointer;
    transition: background .12s; }
  .pp-row:hover { background: rgba(255,255,255,0.07); }
  .pp-row.playing { background: rgba(255,255,255,0.1); }
  .pp-row.playing .pp-name { color: #fff; }
  .pp-idx { font-size: 10px; color: rgba(255,255,255,0.3); width: 20px; flex-shrink: 0; text-align: right; }
  .pp-meta { min-width: 0; flex: 1; }
  .pp-name { font-size: 12px; color: rgba(255,255,255,0.78); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pp-ar { font-size: 10px; color: rgba(255,255,255,0.38); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .pp-vip { font-size: 8px; font-weight: 700; color: rgba(255,180,80,0.9); border: 1px solid rgba(255,180,80,0.5);
    border-radius: 3px; padding: 0 3px; flex-shrink: 0; letter-spacing: .05em; }

  /* ── Lyrics panel (#9) ── */
  #lyrics-panel {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    margin-left: 200px;            /* sit to the right of the focus card */
    width: 300px; max-width: 36vw; max-height: 60vh;
    z-index: 95; pointer-events: none;
    opacity: 0; transition: opacity .35s;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    -webkit-mask-image: linear-gradient(transparent, #000 18%, #000 82%, transparent);
            mask-image: linear-gradient(transparent, #000 18%, #000 82%, transparent);
    overflow: hidden;
  }
  #lyrics-panel.on { opacity: 1; }
  #lp-scroll { transition: transform .4s ease; }
  .lp-line { font-size: 14px; line-height: 2.0; color: rgba(255,255,255,0.32);
    text-align: left; transition: color .3s, font-size .3s; padding: 1px 0; }
  .lp-line.active { color: #fff; font-size: 16px; font-weight: 600; }
  #lp-empty { font-size: 12px; color: rgba(255,255,255,0.3); text-align: center; padding: 20px 0; }
  /* lyrics toggle button inside focus card */
  #fc-lyrics-toggle {
    position: absolute; top: 12px; left: 12px; z-index: 5;
    height: 28px; padding: 0 12px; border-radius: 14px;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.75); font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s; font-family: -apple-system, sans-serif;
  }
  #fc-lyrics-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* ── Player progress with time (#8) ── */
  #pb-times { display: flex; align-items: center; gap: 5px; font-size: 9px;
    color: rgba(255,255,255,0.4); font-family: -apple-system, sans-serif;
    flex-shrink: 0; white-space: nowrap; letter-spacing: .02em; }
  #pb-times .sep { opacity: .5; }

</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- (left sidebar removed — search/library buttons were dead; replaced by expandable playlist in bottom-left) -->

<!-- HUD top-left -->
<div id="hud-tl">
  <div class="ht-logo">⌾</div>
  <div>
    <div class="ht-title">Infinite Canvas</div>
    <div class="ht-sub" id="ht-sub">78 首 · 治愈纯音乐</div>
  </div>
</div>

<!-- HUD top-right -->
<div id="hud-tr">
  <div class="li">
    <span class="li-icon">⊕</span>
    <div><div class="li-key">DRAG</div><div class="li-desc">Pan</div></div>
  </div>
  <div class="li">
    <span class="li-icon">↕</span>
    <div><div class="li-key">SCROLL</div><div class="li-desc">Zoom</div></div>
  </div>
  <div class="li">
    <span class="li-icon">⊡</span>
    <div><div class="li-key">DOUBLE CLICK</div><div class="li-desc">Focus</div></div>
  </div>
</div>

<!-- Crosshair -->
<div id="crosshair">
  <div class="c-corner c-tl"></div><div class="c-corner c-tr"></div>
  <div class="c-corner c-bl"></div><div class="c-corner c-br"></div>
  <div class="c-dot"></div>
</div>

<!-- Browse-state toolbar -->
<div id="toolbar">
  <button class="tb-btn" id="tb-shuffle" title="随机播放">⇄</button>
  <button class="tb-btn" id="tb-loop" title="循环模式">◎</button>
  <button class="tb-btn" id="tb-center" title="镜头归位">⊕</button>
  <div class="tb-sep"></div>
  <span id="tb-label">点击任意封面开始</span>
  <div class="tb-sep"></div>
  <div class="tb-vol">
    <span class="tb-vol-icon">♪</span>
    <input type="range" id="vol-slider" min="0" max="100" value="75">
  </div>
</div>

<!-- (decade timeline removed — meaningless for instrumental playlist) -->

<!-- User info (click to open playlist) -->
<div id="hud-user" title="展开歌单">
  <div class="u-av" id="u-av">♪</div>
  <div>
    <div class="u-name">治愈系歌单</div>
    <div class="u-sub">78 首 · 治愈纯音乐</div>
  </div>
</div>

<!-- Expandable playlist panel -->
<div id="playlist-panel">
  <div id="pp-head">
    <span id="pp-title">治愈系歌单 · 78 首</span>
    <button id="pp-close" title="收起">×</button>
  </div>
  <div id="pp-list"></div>
</div>

<!-- Artist labels -->
<div id="artist-labels"></div>

<!-- Focus glass card -->
<div id="focus-card">
  <div id="fc-art">
    <button id="fc-lyrics-toggle">♫ 歌词</button>
    <button id="fc-close">×</button>
    <img id="fc-img" src="" alt="">
  </div>
  <div id="fc-info">
    <div id="fc-title"></div>
    <div id="fc-artist"></div>
    <div id="fc-year"></div>
  </div>
  <iframe id="fc-embed" allow="autoplay; encrypted-media" allowfullscreen></iframe>

const W = window.innerWidth, H = window.innerHeight;

// ═══════════════════════════════════════════════════════════
// POST-PROCESSING  —  EffectComposer + BokehPass
// ═══════════════════════════════════════════════════════════
// BokehPass uses depth buffer to compute per-pixel blur.
// focus: NDC depth value 0-1 (1=far). For our scene (near=0.5,far=120):
// Objects at ~20 units → NDC depth ≈ (120+0.5-2*0.5*120/20)/(120-0.5) ≈ 0.952
// Objects at ~50 units → NDC depth ≈ 0.982
// We focus at 0.97 (≈25-30 units, near cluster zone)
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bokehPass = new THREE.BokehPass(scene, camera, {
  focus:    0.97,    // NDC focus depth (near clusters)
  aperture: 0.004,   // aperture: higher = more blur for out-of-focus objects
  maxblur:  0.014,   // max blur radius (fraction of screen)
  width: W, height: H
});
bokehPass.renderToScreen = true;
composer.addPass(bokehPass);

function seededRnd(s) { return ((s * 1664525 + 1013904223) & 0x7fffffff) / 0x7fffffff; }
const PALETTE = [0x1a1a2e,0x16213e,0x0f3460,0x533483,0x2b2d42,0x3d405b,0x293241,0x1b4332,0x3b1f2b,0x2c3e50];
function phColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (Math.imul(31,h) + name.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}

const ARTISTS = {};

function clusterOf(name, seed) {
  if (CLUSTER[name]) return CLUSTER[name];
  const a = seed * 2.399;
  return { x: Math.cos(a)*18, y: (seededRnd(seed*77)-0.5)*10, z: -(seededRnd(seed*99)*55+20) };
}

// ═══════════════════════════════════════════════════════════
// BUILD CARDS
// ═══════════════════════════════════════════════════════════
//
// C3-B size layers: scale based on cluster Z depth.
// Near clusters (z≈-12 to -20): scale 1.8–2.8  → LARGE
// Mid clusters  (z≈-30 to -50): scale 0.9–1.4  → MEDIUM
// Far clusters  (z≈-55 to -80): scale 0.35–0.65 → SMALL thumbnails
//
// depth range: z_near=-12, z_far=-80  → range=68
// depthFactor = clamp((z - z_far)/(z_near - z_far), 0,1)  → 1=near, 0=far
//
const Z_NEAR_REF = -12, Z_FAR_REF = -80;
const meshes = [];

// ── 簇内打散：同艺人簇内，同专辑的卡轮流交错，避免相邻同封面 ──
const declusterOrder = {};   // artist -> 该艺人卡片的打散后顺序（原 TRACKS index 数组）
Object.entries(ARTISTS).forEach(([ar, indices]) => {
  const buckets = {};
  indices.forEach(idx => { const k = TRACKS[idx].alName; (buckets[k] = buckets[k] || []).push(idx); });
  const keys = Object.keys(buckets);
  const out = [];
  while (out.length < indices.length) {
    for (const k of keys) { if (buckets[k].length) out.push(buckets[k].shift()); }
  }
  declusterOrder[ar] = out;
});

const loader = new THREE.TextureLoader();

// 否则浮层（z-index:500, inset:0）残留会吃掉所有画布点击 → 卡片选不中。

TRACKS.forEach((track, i) => {
  const ar = track.ar[0];
  const arIdx = Object.keys(ARTISTS).indexOf(ar);
  const ctr = clusterOf(ar, arIdx);

  // Depth-based scale: near=large, far=small
  const df = Math.max(0, Math.min(1, (ctr.z - Z_FAR_REF) / (Z_NEAR_REF - Z_FAR_REF)));
  const depthScale = 0.35 + df * 2.4;        // 0.35 at far → 2.75 at near
  const sizeJitter = 0.75 + seededRnd(i*7+6) * 0.5;  // 0.75–1.25 per-card variation
  const scale = depthScale * sizeJitter;

  // Scatter within cluster
  // 簇内环形分布：同簇卡片按序排到不重叠的角度+半径，按缩放留间距
  const sameCluster = declusterOrder[ar] || [i];
  const localIdx = sameCluster.indexOf(i);
  const ringStep = 2.39996;                       // 黄金角，避免对齐
  const ang = localIdx * ringStep;
  const radius = (BASE_CARD * scale * 0.9) * (1.1 + localIdx * 0.7);
  const jx = Math.cos(ang) * radius;
  const jy = Math.sin(ang) * radius * 0.55 + (seededRnd(i*7+1) - 0.5) * 1.2;
  const jz = Math.sin(ang * 1.7) * radius * 0.4;

  // Card rotations — vertical, personality tilts
  const rx = (seededRnd(i*7+3) - 0.5) * 0.30;
  const ry = (seededRnd(i*7+4) - 0.5) * 0.44;
  const rz = (seededRnd(i*7+5) - 0.5) * 0.22;

  const geo = new THREE.PlaneGeometry(BASE_CARD, BASE_CARD);
  const mat = new THREE.MeshBasicMaterial({ color: phColor(track.name), side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);

  mesh.rotation.set(rx, ry, rz);       // VERTICAL cards, no -PI/2 floor rotation
  mesh.position.set(ctr.x+jx, ctr.y+jy, ctr.z+jz);
  mesh.scale.setScalar(scale);
  mesh.userData.baseScale = scale;   // 供 hover/选中动画用
  mesh.userData.track = track;

  scene.add(mesh);
  meshes.push(mesh);

  loader.load(track.alPicUrl,
    (tex) => {
      mesh.material.dispose();
      mesh.material = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
      onProgress();
    },
    undefined,
    () => onProgress()
  );
});

// DEPTH BRIGHTNESS  (fake DOF layer — distance darkening)
// Works alongside BokehPass: far cards are dark + blurry.
// ═══════════════════════════════════════════════════════════
function updateDepth() {
  const cx = camX, cy = camY, cz = camZ;
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    const d = Math.sqrt((m.position.x-cx)**2+(m.position.y-cy)**2+(m.position.z-cz)**2);
    m.material.color.setScalar(Math.max(0.07, 1.0 - d/80));
  }
}

// ── 每张卡的固定个性偏转（一次性生成，不随帧变，避免抖动）──
const cardTilt = meshes.map((_, i) => ({
  rx: (seededRnd(i*7+3) - 0.5) * 0.50,
  ry: (seededRnd(i*7+4) - 0.5) * 0.70,
  rz: (seededRnd(i*7+5) - 0.5) * 0.34,
}));

// ── #11 呼吸感：记录每张卡基准位置 + 随机相位/速度，animate 里叠加极轻浮动 ──
const cardBase = meshes.map(m => m.position.clone());
const cardBreath = meshes.map((_, i) => ({
  phase: seededRnd(i*13+2) * Math.PI * 2,
  speed: 0.35 + seededRnd(i*13+5) * 0.4,        // 慢，呼吸节奏
  ampX:  0.10 + seededRnd(i*13+7) * 0.18,
  ampY:  0.14 + seededRnd(i*13+9) * 0.22,
  ampS:  0.010 + seededRnd(i*13+11) * 0.015,    // 极轻缩放呼吸
}));
function updateBreath(t) {
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    if (m === focusedMesh) continue;             // 聚焦卡不漂
    const b = cardBreath[i], base = cardBase[i];
    const ph = t * b.speed + b.phase;
    m.position.x = base.x + Math.sin(ph) * b.ampX;
    m.position.y = base.y + Math.cos(ph * 0.9) * b.ampY;
  }
}

// ── billboard 基准朝向 + 叠加固定偏转 ──
function updateBillboard() {
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    m.lookAt(camera.position);
    if (m === focusedMesh) continue;     // 聚焦卡：只正对相机，不加个性偏转
    m.rotateX(cardTilt[i].rx);
    m.rotateY(cardTilt[i].ry);
    m.rotateZ(cardTilt[i].rz);
  }
}

  progressTimer = setInterval(() => {
    playElapsed++;
    const pct = Math.min(100, (playElapsed / curDuration) * 100);
    pbProgressFill.style.width = pct + '%';
    pbCur.textContent = fmtTime(playElapsed);
    syncLyrics(playElapsed);
    if (playElapsed >= curDuration) clearInterval(progressTimer);
  }, 1000);
}

function stopProgress() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  pbProgressFill.style.width = '0%';
  pbCur.textContent = '0:00';
}

function updateScrollTitle(text) {
  pbTitle.classList.remove('scrolling');
  pbTitle.textContent = text;
  pbTitle.style.removeProperty('--scroll-dist');
  // 下一帧测量是否溢出
  requestAnimationFrame(() => {
    const overflow = pbTitle.scrollWidth - pbTitle.clientWidth;
    if (overflow > 4) {
      pbTitle.style.setProperty('--scroll-dist', `-${overflow + 8}px`);
      pbTitle.classList.add('scrolling');
    }
  });
}

// ── #9 歌词：解析 lrc、渲染、按时间轴高亮 ──
const lyricsPanel = document.getElementById('lyrics-panel');
const lpScroll    = document.getElementById('lp-scroll');
let lyricsOn = false;          // 用户是否开启歌词显示
let parsedLyrics = [];         // [{t: 秒, text}]
let lyricActiveIdx = -1;

function parseLrc(lrc) {
  const out = [];
  if (!lrc) return out;
  lrc.split('\n').forEach(line => {
    const m = line.match(/^\[(\d{1,2}):(\d{1,2})(?:\.(\d{1,3}))?\](.*)$/);
    if (!m) return;
    const t = parseInt(m[1]) * 60 + parseInt(m[2]) + (m[3] ? parseInt(m[3].padEnd(3,'0')) / 1000 : 0);
    const text = m[4].trim();
    out.push({ t, text });
  });
  out.sort((a, b) => a.t - b.t);
  return out;
}

function loadLyrics(track) {
  parsedLyrics = parseLrc(LYRICS[track.id]);
  lyricActiveIdx = -1;
  lpScroll.innerHTML = '';
  if (!parsedLyrics.length) {
    lpScroll.innerHTML = '<div id="lp-empty">暂无歌词</div>';
    return;
  }
  parsedLyrics.forEach((ln, i) => {
    const d = document.createElement('div');
    d.className = 'lp-line';
    d.dataset.i = i;
    d.textContent = ln.text || '· · ·';
    lpScroll.appendChild(d);
  });
  lpScroll.style.transform = 'translateY(0)';
}

function syncLyrics(sec) {
  if (!lyricsOn || !parsedLyrics.length) return;
  let idx = -1;
  for (let i = 0; i < parsedLyrics.length; i++) {
    if (parsedLyrics[i].t <= sec) idx = i; else break;
  }
  if (idx === lyricActiveIdx) return;
  lyricActiveIdx = idx;
  const lines = lpScroll.children;
  for (let i = 0; i < lines.length; i++) lines[i].classList.toggle('active', i === idx);
  // 让当前行居中：按行高估算偏移
  if (idx >= 0 && lines[idx]) {
    const lineH = lines[idx].offsetTop;
    lpScroll.style.transform = `translateY(${ -lineH + 110 }px)`;
  }
}

function applyLyricsVisibility() {
  // 只有在 focus 且用户开启时才显示
  if (lyricsOn && focusMode) lyricsPanel.classList.add('on');
  else lyricsPanel.classList.remove('on');
}


function loadTrack(idx, autoplay) {
  if (idx < 0 || idx >= TRACKS.length) return;
  currentTrackIdx = idx;
  const track = TRACKS[idx];
  curDuration = DURATIONS[track.id] || DEFAULT_DURATION;   // #8 真实时长 or 回退
  loadLyrics(track);                                        // #9 装载歌词
  pbDur.textContent = fmtTime(curDuration);
  // 更新 focus card（切歌时也唤出大卡，新歌专辑卡始终显示）
  fcImg.src            = track.alPicUrl;
  fcTitle.textContent  = track.name;
  fcArtist.textContent = track.ar.join(' / ');
  fcYear.textContent   = track.alName;
  focusMode = true;
  focusCard.classList.add('on');
  toolbar.classList.add('hidden');
  crosshair.classList.add('hidden');
  applyLyricsVisibility();
  // 同步更新 focusedMesh
  const mesh = meshes.find(m => m.userData.track && m.userData.track.id === track.id);
  if (mesh) focusedMesh = mesh;
  // 更新 player bar
  pbThumb.src          = track.alPicUrl;
  updateScrollTitle(track.name);
  pbArtist.textContent = track.ar.join(' / ');
  playerBar.classList.add('on');
  renderPlaylist();      // 高亮当前曲
  isPlaying = false;
  pbPlay.innerHTML = '&#9654;';
  stopProgress();
}

function enterFocus(track) {
  focusMode = true;
  togglePlaylist(false);   // #2 选歌后自动收起歌单
  const idx = TRACKS.findIndex(t => t.id === track.id);
  loadTrack(idx, true);
  focusCard.classList.add('on');
  toolbar.classList.add('hidden');
  crosshair.classList.add('hidden');
  applyLyricsVisibility();
  // 会员歌：自动弹 pop-up（fee 在数据层已知，无需检测播放）
  if (isVip(track)) {
    showVipPop();
  } else {
    hideVipPop();
    playCurrent();   // #6 点卡即播（仍在用户手势栈内，稳定出声）
  }
}

// ── 会员歌判定与处理 ──
function isVip(track) { return track && (track.fee === 1 || track.fee === 4); }

// 从 idx 之后找下一首非会员歌（循环到末尾，找不到返回 -1）
function nextFreeIdx(fromIdx) {
  for (let step = 1; step <= TRACKS.length; step++) {
    const j = (fromIdx + step) % TRACKS.length;
    if (!isVip(TRACKS[j])) return j;
  }
  return -1;
}

function showVipPop() {
  document.getElementById('vip-pop').classList.add('on');
  setPlayingUI(false);
  stopProgress();
}
function hideVipPop() {
  document.getElementById('vip-pop').classList.remove('on');
}

function exitFocus() {
  focusMode = false;
  focusedMesh = null;
  focusCard.classList.remove('on');
  toolbar.classList.remove('hidden');
  crosshair.classList.remove('hidden');
  lyricsPanel.classList.remove('on');
  hideVipPop();
  // player bar 保留，embed 继续发声
}

// 这三个按钮(尤其 vip-login/vip-skip)的 HTML 在脚本标签之后,
// 脚本执行时尚未解析,故延迟到 window load(全部 DOM 就绪)后再绑定。
window.addEventListener('load', () => {
  document.getElementById('fc-close')?.addEventListener('click', exitFocus);
  // vip pop-up 按钮
  document.getElementById('vip-login')?.addEventListener('click', () => {
    // 跳转网易云登录（新标签页），用户登录后回到本站再点播放即可继承登录态
    window.open('https://music.163.com/#/login', '_blank');
  });
  document.getElementById('vip-skip')?.addEventListener('click', () => {
    hideVipPop();
    const j = nextFreeIdx(currentTrackIdx);
    if (j >= 0) {
      const t = TRACKS[j];
      const mesh = meshes.find(m => m.userData.track && m.userData.track.id === t.id);
      if (mesh) focusedMesh = mesh;
      enterFocus(t);
    }
  });
});

// 播放/暂停 UI 状态集中处理（含 #3 左下角图标转动）
const uAv = document.getElementById('u-av');
function setPlayingUI(on) {
  isPlaying = on;
  pbPlay.innerHTML = on ? '&#9646;&#9646;' : '&#9654;';
  if (on) uAv.classList.add('spinning'); else uAv.classList.remove('spinning');
}

// player bar 控制
pbPlay.addEventListener('click', () => {
  if (currentTrackIdx < 0) return;
  const track = TRACKS[currentTrackIdx];
  if (isPlaying) {
    // 暂停：清空 src 停声
    fcEmbed.src = '';
    setPlayingUI(false);
    stopProgress();
  } else {
    if (isVip(track)) { showVipPop(); return; }
    playCurrent();
  }
});

pbPrev.addEventListener('click', () => {
  const j = prevIdx(currentTrackIdx);
  if (j < 0) return;
  loadTrack(j, true);
  if (!isVip(TRACKS[j])) playCurrent();
  else showVipPop();
});

pbNext.addEventListener('click', () => {
  const j = nextIdx(currentTrackIdx);
  if (j < 0) return;
  loadTrack(j, true);
  if (!isVip(TRACKS[j])) playCurrent();
  else showVipPop();
});

// 用当前曲目加载播放器并出声（仅在用户手势栈内调用）
function playCurrent() {
  if (currentTrackIdx < 0) return;
  const track = TRACKS[currentTrackIdx];
  if (isVip(track)) { showVipPop(); return; }
  fcEmbed.src = `https://music.163.com/outchain/player?type=2&id=${track.id}&auto=1&height=66&_t=${Date.now()}`;
  setPlayingUI(true);
  startProgress();
}

// 上一首/下一首：受循环模式影响（loopMode: 'list' | 'one' | 'off'；shuffle 独立）
let shuffleOn = false;
let loopMode = 'list';   // list=列表循环, one=单曲循环, off=播完即止
function nextIdx(from) {
  if (from < 0) return 0;
  if (shuffleOn) { let r; do { r = Math.floor(Math.random()*TRACKS.length); } while (TRACKS.length>1 && r===from); return r; }
  if (loopMode === 'one') return from;
  if (from < TRACKS.length - 1) return from + 1;
  return loopMode === 'list' ? 0 : -1;
}
function prevIdx(from) {
  if (from < 0) return 0;
  if (shuffleOn) { let r; do { r = Math.floor(Math.random()*TRACKS.length); } while (TRACKS.length>1 && r===from); return r; }
  if (from > 0) return from - 1;
  return loopMode === 'list' ? TRACKS.length - 1 : -1;
}

// ═══════════════════════════════════════════════════════════
// UI WIRING  (#2 toolbar, #4 playlist, #9 lyrics toggle)
// 这些元素都在主脚本标签之前，可在顶层直接绑定。
// ═══════════════════════════════════════════════════════════
function recenter() {
  flyTarget = { x: 0, y: 8, z: 5 };
}
// #2 工具条
document.getElementById('tb-shuffle')?.addEventListener('click', (e) => {
  shuffleOn = !shuffleOn;
  e.currentTarget.classList.toggle('active', shuffleOn);
  e.currentTarget.title = shuffleOn ? '随机播放：开' : '随机播放：关';
});
document.getElementById('tb-loop')?.addEventListener('click', (e) => {
  loopMode = loopMode === 'list' ? 'one' : loopMode === 'one' ? 'off' : 'list';
  e.currentTarget.classList.toggle('active', loopMode !== 'off');
  e.currentTarget.title = loopMode === 'list' ? '循环：列表' : loopMode === 'one' ? '循环：单曲' : '循环：关';
  e.currentTarget.textContent = loopMode === 'one' ? '①' : '◎';
});
document.getElementById('tb-center')?.addEventListener('click', recenter);

// 音量：网易云 embed 跨域不可控音量，这里用 iframe 透明度无意义——
// 退而用本地静音兜底（embed 自身音量条仍可用）。先保留滑块，绑一个本地占位。
document.getElementById('vol-slider')?.addEventListener('input', () => { /* embed 跨域，音量由其自带控件控制 */ });

// #9 歌词开关
document.getElementById('fc-lyrics-toggle')?.addEventListener('click', () => {
  lyricsOn = !lyricsOn;
  const btn = document.getElementById('fc-lyrics-toggle');
  btn.style.background = lyricsOn ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.5)';
  applyLyricsVisibility();
});

// #4 歌单面板
const playlistPanel = document.getElementById('playlist-panel');
const ppList = document.getElementById('pp-list');
function renderPlaylist() {
  if (!ppList) return;
  if (ppList.childElementCount === TRACKS.length) {
    // 已渲染，只更新高亮
    [...ppList.children].forEach((row, i) => row.classList.toggle('playing', i === currentTrackIdx));
    const cur = ppList.children[currentTrackIdx];
    if (cur && playlistPanel.classList.contains('on')) cur.scrollIntoView({ block: 'nearest' });
    return;
  }
  ppList.innerHTML = '';
  TRACKS.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'pp-row' + (i === currentTrackIdx ? ' playing' : '');
    row.innerHTML =
      `<span class="pp-idx">${i+1}</span>` +
      `<div class="pp-meta"><div class="pp-name">${t.name}</div><div class="pp-ar">${t.ar.join(' / ')}</div></div>` +
      (isVip(t) ? `<span class="pp-vip">VIP</span>` : '');
    row.addEventListener('click', () => {
      const mesh = meshes.find(m => m.userData.track && m.userData.track.id === t.id);
      if (mesh) {
        focusedMesh = mesh;
        const p = mesh.position;
        flyTarget = { x: camX + (p.x-camX)*0.6, y: camY + (p.y-camY)*0.6, z: Math.max(p.z + 9, camZ - 22) };
      }
      enterFocus(t);   // 点列表项即定位 + 播放（用户手势栈内）
    });
    ppList.appendChild(row);
  });
}
function togglePlaylist(force) {
  const on = force !== undefined ? force : !playlistPanel.classList.contains('on');
  playlistPanel.classList.toggle('on', on);
  if (on) renderPlaylist();
}
document.getElementById('hud-user')?.addEventListener('click', () => togglePlaylist());
document.getElementById('pp-close')?.addEventListener('click', () => togglePlaylist(false));


// ═══════════════════════════════════════════════════════════
// RAYCASTER  (selection + hover)
// ═══════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();
let mdX = 0, mdY = 0;
document.addEventListener('mousedown', e => { mdX = e.clientX; mdY = e.clientY; });
document.addEventListener('mouseup', e => {
  if (e.target.closest('#focus-card') || e.target.closest('#toolbar') || e.target.closest('#player-bar') || e.target.closest('#playlist-panel') || e.target.closest('#hud-user') || e.target.closest('#lyrics-panel') || e.target.closest('#vip-pop')) return;
  if (Math.hypot(e.clientX-mdX, e.clientY-mdY) > 6) return;
  pointer.x =  (e.clientX/window.innerWidth)*2 - 1;
  pointer.y = -(e.clientY/window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length) {
    focusedMesh = hits[0].object;
    triggerPunch(hits[0].object);   // 选中"按一下"反馈
    enterFocus(hits[0].object.userData.track);
  } else if (focusMode) {
    exitFocus();
  }
});

// ── 悬停反馈：光标变 pointer + 卡片轻微放大；选中时"按一下"动画 ──
let hoveredMesh = null;
let punchMesh = null, punchT = 0;
function triggerPunch(mesh) { punchMesh = mesh; punchT = 0; }

let _hoverMX = -1, _hoverMY = -1;
document.addEventListener('mousemove', e => {
  _hoverMX = e.clientX; _hoverMY = e.clientY;
});
function updateHover() {
  if (_hoverMX < 0 || dragging) { return; }
  pointer.x =  (_hoverMX/window.innerWidth)*2 - 1;
  pointer.y = -(_hoverMY/window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  const hit = hits.length ? hits[0].object : null;
  hoveredMesh = hit;
  document.body.classList.toggle('hover-card', !!hit);
}
function updateCardFX() {
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    if (m === focusedMesh) continue;
    let target = m.userData.baseScale;
    if (m === hoveredMesh) target *= 1.08;           // 悬停放大
    // 选中"按一下"：先弹大再回落
    if (m === punchMesh) {
      const k = Math.sin(Math.min(1, punchT) * Math.PI);  // 0→1→0
      target *= (1 + 0.22 * k);
    }
    const cur = m.scale.x;
    m.scale.setScalar(cur + (target - cur) * 0.25);   // 平滑过渡
  }
  if (punchMesh) { punchT += 0.06; if (punchT >= 1) punchMesh = null; }
}

// Double-click: fly toward card
document.addEventListener('dblclick', e => {
  if (e.target.closest('#focus-card')) return;
  pointer.x =  (e.clientX/window.innerWidth)*2 - 1;
  pointer.y = -(e.clientY/window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length) {
    const p = hits[0].object.position;
    const STEP = 22;
    const targetZ = Math.max(p.z + 9, camZ - STEP);
    flyTarget = {
      x: camX + (p.x - camX) * 0.5,
      y: camY + (p.y - camY) * 0.5,
      z: targetZ
    };
  }
});

// ═══════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  const _t = performance.now() * 0.001;
  updateBreath(_t);   // #11 卡片呼吸（focus 卡已排除）
  updateHover();      // 悬停检测（光标 + 放大目标）
  updateCardFX();     // 平滑应用 hover / 选中动画

  // Camera fly-to
  if (flyTarget) {
    camX += (flyTarget.x - camX) * .12;
    camY += (flyTarget.y - camY) * .12;
    camZ += (flyTarget.z - camZ) * .12;
    if (Math.abs(flyTarget.z - camZ) < .05) flyTarget = null;
  } else if (!dragging) {
    camX += velX; camY += velY;
    velX *= .88; velY *= .88;
    if (Math.abs(velX) < .001) velX = 0;
    if (Math.abs(velY) < .001) velY = 0;
  }

  // ── 软边界宇宙：越界橡皮筋回弹，永不黑边、永不过近变糊 ──
  const Z_MIN = -68, Z_MAX = 14;     // 近/远边界（防糊近界 + 防空旷远界）
  const X_LIM = 40, Y_LIM = 22;      // 拖拽边界
  const PULL = 0.08;                 // 回弹力度
  if (camZ < Z_MIN) camZ += (Z_MIN - camZ) * PULL;
  if (camZ > Z_MAX) camZ += (Z_MAX - camZ) * PULL;
  if (camX < -X_LIM) camX += (-X_LIM - camX) * PULL;
  if (camX >  X_LIM) camX += ( X_LIM - camX) * PULL;
  if (camY < -Y_LIM) camY += (-Y_LIM - camY) * PULL;
  if (camY >  Y_LIM) camY += ( Y_LIM - camY) * PULL;

  applyCamera();
  updateDepth();
  updateBillboard();
  updateLabels();

  // Render: DOF composer or plain fallback
  renderer.clear();
  if (USE_DOF) {
    composer.render();
  } else {
    // ── 星空闪烁（辉光 sprite + 整体明暗呼吸 + 局部抖动）#10 ──
    const st = performance.now() * 0.001;
    starMat.opacity = 0.70 + 0.25 * Math.sin(st * 1.2);
    starMat.size = 1.05 + 0.18 * Math.sin(st * 2.3);
    const starPosArr = starGeo.attributes.position.array;
    const slice = Math.floor(STAR_N / 8);
    const base = Math.floor(st * 30) % 8 * slice;
    for (let i = base; i < base + slice && i < STAR_N; i++) {
      starPosArr[i*3+1] += (Math.random() - 0.5) * 0.004;
    }
    starGeo.attributes.position.needsUpdate = true;

    // ── 流星（亮拖尾 + 发光头）#10 ──
    for (const mt of meteors) {
      if (!mt.active) {
        mt.nextAt -= 0.016;
        if (mt.nextAt <= 0) { mt.reset(); mt.nextAt = 3 + Math.random() * 6; }
        continue;
      }
      mt.t += 0.016 / mt.duration;
      if (mt.t >= 1) { mt.active = false; mt.mesh.material.opacity = 0; mt.head.material.opacity = 0; continue; }
      const head = mt.t;
      const tail = Math.max(0, mt.t - mt.len);
      const pts = mt.mesh.geometry.attributes.position.array;
      const hx = mt.ox + mt.dx * head, hy = mt.oy + mt.dy * head, hz = mt.oz + mt.dz * head;
      pts[0] = hx; pts[1] = hy; pts[2] = hz;
      pts[3] = mt.ox + mt.dx * tail; pts[4] = mt.oy + mt.dy * tail; pts[5] = mt.oz + mt.dz * tail;
      mt.mesh.geometry.attributes.position.needsUpdate = true;
      const fade = mt.t < 0.1 ? mt.t / 0.1 : mt.t > 0.8 ? (1 - mt.t) / 0.2 : 1;
      mt.mesh.material.opacity = 1.0 * fade;
      mt.head.position.set(hx, hy, hz);
      mt.head.material.opacity = 0.95 * fade;
    }

    renderer.render(scene, camera);
  }
}
animate();

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const W2 = window.innerWidth, H2 = window.innerHeight;
  camera.aspect = W2 / H2;
  camera.updateProjectionMatrix();
  renderer.setSize(W2, H2);
  composer.setSize(W2, H2);
});
</script>
