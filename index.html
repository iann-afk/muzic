<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Canvas · 治愈系歌单</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; cursor: grab; }
  body.drag { cursor: grabbing; }
  body.hover-card { cursor: pointer; }
  body.hover-card.drag { cursor: grabbing; }
  #c { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  /* ── HUD top-left ── */
  #hud-tl {
    position: fixed; top: 22px; left: 24px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none; z-index: 30;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  .ht-logo { width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(255,255,255,0.7); }
  .ht-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.82); letter-spacing: .02em; }
  .ht-sub { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: .03em; }

  /* ── HUD top-right legend ── */
  #hud-tr {
    position: fixed; top: 22px; right: 24px;
    display: flex; gap: 18px; align-items: flex-start;
    pointer-events: none; z-index: 30;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }
  .li { display: flex; align-items: center; gap: 7px; }
  .li-icon { font-size: 14px; color: rgba(255,255,255,0.4); }
  .li-key { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: rgba(255,255,255,0.72); text-transform: uppercase; }
  .li-desc { font-size: 9px; color: rgba(255,255,255,0.32); margin-top: 2px; }

  /* ── Crosshair (browse state) ── */
  #crosshair {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px;
    pointer-events: none; z-index: 20;
    transition: opacity .3s;
  }
  #crosshair .c-corner {
    position: absolute; width: 12px; height: 12px;
    border-color: rgba(255,255,255,0.55); border-style: solid; border-width: 0;
  }
  #crosshair .c-tl { top:0; left:0; border-top-width:1.5px; border-left-width:1.5px; }
  #crosshair .c-tr { top:0; right:0; border-top-width:1.5px; border-right-width:1.5px; }
  #crosshair .c-bl { bottom:0; left:0; border-bottom-width:1.5px; border-left-width:1.5px; }
  #crosshair .c-br { bottom:0; right:0; border-bottom-width:1.5px; border-right-width:1.5px; }
  #crosshair .c-dot {
    position: absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width: 5px; height: 5px; border-radius:50%;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(255,255,255,0.3);
  }
  #crosshair.hidden { opacity: 0; }

  /* ── Bottom capsule toolbar (browse state) ── */
  #toolbar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    background: rgba(10,10,16,0.75); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px; padding: 10px 20px;
    z-index: 30; white-space: nowrap;
    font-family: -apple-system, sans-serif;
    transition: opacity .3s, transform .3s;
  }
  #toolbar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(10px); visibility: hidden; }
  .tb-btn {
    width: 28px; height: 28px; background: none;
    border: none; color: rgba(255,255,255,0.45);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .12s, color .12s;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
  .tb-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }
  #tb-label { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: .02em; padding: 0 4px; }
  .tb-vol { display: flex; align-items: center; gap: 8px; }
  .tb-vol-icon { font-size: 13px; color: rgba(255,255,255,0.4); }
  #vol-slider { width: 70px; height: 3px; cursor: pointer; accent-color: rgba(255,255,255,0.6); }

  /* ── Bottom-left user (persistent) ── */
  #hud-user {
    position: fixed; bottom: 24px; left: 24px;
    display: flex; align-items: center; gap: 9px;
    z-index: 30; cursor: pointer;
    font-family: -apple-system, sans-serif;
    transition: opacity .2s;
  }
  #hud-user:hover { opacity: .82; }
  .u-av { width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(255,255,255,0.5); }
  .u-av.spinning { animation: u-spin 3.5s linear infinite; }
  @keyframes u-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .u-name { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 500; }
  .u-sub { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  /* 常驻「换歌单」入口：低饱和胶囊，可见但不抢视觉；hover 提亮 */
  #u-change {
    margin-left: 4px; flex: 0 0 auto;
    height: 24px; padding: 0 10px; border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: .02em;
    cursor: pointer; white-space: nowrap;
    transition: background .2s, color .2s, border-color .2s;
    font-family: -apple-system, sans-serif;
  }
  #u-change:hover {
    background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.92);
    border-color: rgba(255,255,255,0.3);
  }

  /* ── Artist labels ── */
  .al { position: fixed; transform: translate(-50%,-50%);
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    transition: opacity .4s;
    cursor: pointer; pointer-events: auto;
    padding: 6px 8px; margin: -6px -8px; border-radius: 8px;
    background: transparent; }
  /* 容器本体不吃事件（避免覆盖在卡片上方抢点击），只让文字命中区域可点 */
  #artist-labels { pointer-events: none; }
  .al:hover { background: rgba(255,255,255,0.06); }
  .al:hover .al-name { color: rgba(255,255,255,0.98);
    text-shadow: 0 0 12px rgba(255,255,255,0.5); }
  .al:hover .al-dot  { background: rgba(255,255,255,0.95);
    box-shadow: 0 0 8px rgba(255,255,255,0.7); }
  .al:hover .al-count { color: rgba(255,255,255,0.6); }
  .al-dot { width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.5); margin-bottom: 3px;
    transition: background .2s, box-shadow .2s; }
  .al-name { font-size: 8px; font-weight: 700; letter-spacing: .14em;
    color: rgba(255,255,255,0.6); text-transform: uppercase; white-space: nowrap;
    font-family: -apple-system, sans-serif;
    transition: color .2s, text-shadow .2s; }
  .al-count { font-size: 8px; color: rgba(255,255,255,0.28); white-space: nowrap;
    font-family: -apple-system, sans-serif; transition: color .2s; }

  /* ── Focus glass card ── */
  #focus-card {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    width: 340px;
    background: rgba(10,10,16,0.82);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; overflow: hidden;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity .35s, transform .35s;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }
  #focus-card.on { opacity: 1; transform: translate(-50%,-50%) scale(1); pointer-events: all; }
  #fc-art { width: 100%; aspect-ratio: 1; overflow: hidden; position: relative; }
  #fc-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* 封面动效画布：覆盖在静态封面之上，播放时渲染碎片粒子+波纹 */
  #fc-fx { position: absolute; inset: 0; width: 100%; height: 100%;
    display: none; pointer-events: none; }
  #fc-fx.on { display: block; }
  #fc-close {
    position: absolute; top: 12px; right: 12px; z-index: 5;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  #fc-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
  #fc-info { padding: 16px 18px 10px; }
  #fc-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; }
  #fc-artist { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; }
  #fc-year { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  #fc-embed { position: fixed; bottom: -2px; right: -2px; width: 1px; height: 1px; opacity: 0; pointer-events: none; border: none; }

  /* ── Player bar (bottom, iOS glass) ── */
  #player-bar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    display: flex; align-items: center; gap: 14px;
    background: rgba(10,10,16,0.75); backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 32px; padding: 8px 20px 8px 10px;
    z-index: 40; min-width: 320px; max-width: 480px;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    opacity: 0; pointer-events: none;
    transition: opacity .35s, transform .35s;
  }
  #player-bar.on { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
  #pb-thumb {
    width: 44px; height: 44px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #pb-info { flex: 1; min-width: 0; width: 160px; max-width: 160px; overflow: hidden; }
  #pb-title {
    font-size: 13px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden;
    display: inline-block; width: 100%;
  }
  #pb-title.scrolling {
    animation: pb-scroll 8s linear 1s infinite;
  }
  @keyframes pb-scroll {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(var(--scroll-dist)); }
    60%  { transform: translateX(var(--scroll-dist)); }
    100% { transform: translateX(0); }
  }
  #pb-artist { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #pb-progress-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 32px 32px; overflow: hidden; background: rgba(255,255,255,0.08); }
  #pb-progress-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.45); transition: width .5s linear; border-radius: 0 0 32px 32px; }
  #pb-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .pb-btn {
    width: 32px; height: 32px; background: none; border: none;
    color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: background .12s, color .12s;
  }
  .pb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  #pb-play { width: 36px; height: 36px; font-size: 18px; color: #fff; }

  /* ── Loading ── */
  #loading { position: fixed; inset: 0; background: #050508; z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity .8s; font-family: -apple-system, sans-serif; }
  #ld-label { font-size: 11px; letter-spacing: .1em; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
  #ld-track { width: 160px; height: 1px; background: rgba(255,255,255,0.1); }
  #ld-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.4); transition: width .08s; }
  /* ── 开屏引导浮层 ── */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(3,3,8,0.78); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    transition: opacity .35s;
  }
  #intro-overlay.hidden { opacity: 0; pointer-events: none; }
  #intro-box {
    width: 380px; max-width: calc(100vw - 40px);
    background: rgba(14,14,20,0.95);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px; padding: 24px 24px 20px;
    color: rgba(255,255,255,0.82);
  }
  #intro-title { font-size: 17px; font-weight: 700; color:#fff; margin-bottom: 12px; }
  .intro-p { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.7); margin-bottom: 12px; }
  .intro-p b { color: rgba(255,255,255,0.92); font-weight: 600; }
  .intro-p a { color: #6ab3ff; text-decoration: none; }
  .intro-p a:hover { text-decoration: underline; }
  .intro-p code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .intro-det { font-size: 13px; margin-bottom: 16px; }
  .intro-det summary { cursor: pointer; color: rgba(255,255,255,0.6); padding: 4px 0; }
  .intro-det summary:hover { color: rgba(255,255,255,0.85); }
  #intro-close {
    width: 100%; padding: 11px; border-radius: 10px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 14px; cursor: pointer; transition: background .15s;
  }
  #intro-close:hover { background: rgba(255,255,255,0.2); }

  /* ── 播放器常驻提示 ── */
  #pb-hint {
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    margin-bottom: 8px; white-space: nowrap;
    font-size: 10px; color: rgba(255,255,255,0.5);
    background: rgba(10,10,16,0.85); padding: 4px 12px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
    font-family: -apple-system, sans-serif;
  }


  /* ── Expandable playlist panel (#4) ── */
  #playlist-panel {
    position: fixed; left: 24px; bottom: 70px; z-index: 60;
    width: 300px; max-width: calc(100vw - 48px); max-height: 52vh;
    background: rgba(12,12,18,0.92); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
    display: flex; flex-direction: column; overflow: hidden;
    opacity: 0; pointer-events: none; transform: translateY(10px) scale(0.98);
    transition: opacity .25s, transform .25s;
    font-family: -apple-system, sans-serif;
  }
  #playlist-panel.on { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
  #pp-head { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  #pp-tabs { display: flex; gap: 4px; }
  .pp-tab { background: none; border: none; cursor: pointer;
    font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.42);
    padding: 5px 11px; border-radius: 8px; transition: color .2s, background .2s;
    font-family: -apple-system, sans-serif; }
  .pp-tab:hover { color: rgba(255,255,255,0.7); }
  .pp-tab.active { color: #fff; background: rgba(255,255,255,0.1); font-weight: 600; }
  #pp-close { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08);
    border: none; color: rgba(255,255,255,0.7); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #pp-close:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .pp-pane { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .pp-pane[hidden] { display: none; }
  #pp-cur-name { padding: 11px 14px 7px; font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.85); letter-spacing: .02em; flex-shrink: 0; }
  #pp-list { overflow-y: auto; padding: 0 0 6px; }
  /* ── 换歌单 tab：上传入口 ── */
  #pp-upload { display: flex; gap: 6px; padding: 14px 14px 4px; }
  #pp-url {
    flex: 1; min-width: 0; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 8px 10px; color: rgba(255,255,255,0.85); font-size: 12px;
    outline: none; transition: border-color .2s, background .2s;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
  }
  #pp-url::placeholder { color: rgba(255,255,255,0.3); }
  #pp-url:focus { border-color: rgba(255,255,255,0.32); background: rgba(255,255,255,0.09); }
  #pp-load {
    flex: 0 0 auto; background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 8px;
    padding: 8px 14px; color: rgba(255,255,255,0.85); font-size: 12px;
    cursor: pointer; transition: background .2s; white-space: nowrap;
  }
  #pp-load:hover { background: rgba(255,255,255,0.2); }
  #pp-load:disabled { opacity: .5; cursor: default; }
  #pp-upload-msg { padding: 6px 14px 2px; font-size: 11px; line-height: 1.5; min-height: 16px;
    color: rgba(255,255,255,0.45); transition: color .2s; }
  #pp-upload-msg.err { color: rgba(255,140,140,0.9); }
  #pp-upload-msg.ok { color: rgba(150,220,170,0.92); }
  #pp-history-label { padding: 10px 14px 6px; font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: rgba(255,255,255,0.32); flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.06); margin-top: 4px; }
  #pp-history { overflow-y: auto; padding-bottom: 8px; }
  .pp-hist { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer;
    transition: background .12s; }
  .pp-hist:hover { background: rgba(255,255,255,0.07); }
  .pp-hist.active { background: rgba(255,255,255,0.1); }
  .pp-hist-ic { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
    background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(255,255,255,0.5); overflow: hidden; }
  .pp-hist-ic img { width: 100%; height: 100%; object-fit: cover; }
  .pp-hist-meta { min-width: 0; flex: 1; }
  .pp-hist-name { font-size: 12px; color: rgba(255,255,255,0.82); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .pp-hist-sub { font-size: 10px; color: rgba(255,255,255,0.36); margin-top: 1px; }
  .pp-hist.active .pp-hist-name { color: #fff; }
  .pp-row { display: flex; align-items: center; gap: 9px; padding: 8px 14px; cursor: pointer;
    transition: background .12s; }
  .pp-row:hover { background: rgba(255,255,255,0.07); }
  .pp-row.playing { background: rgba(255,255,255,0.1); }
  .pp-row.playing .pp-name { color: #fff; }
  .pp-idx { font-size: 10px; color: rgba(255,255,255,0.3); width: 20px; flex-shrink: 0; text-align: right; }
  .pp-meta { min-width: 0; flex: 1; }
  .pp-name { font-size: 12px; color: rgba(255,255,255,0.78); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pp-ar { font-size: 10px; color: rgba(255,255,255,0.38); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .pp-vip { font-size: 8px; font-weight: 700; color: rgba(255,180,80,0.9); border: 1px solid rgba(255,180,80,0.5);
    border-radius: 3px; padding: 0 3px; flex-shrink: 0; letter-spacing: .05em; }

  /* ── Lyrics panel (#9) ── */
  #lyrics-panel {
    position: fixed; top: 50%; right: max(4vw, 28px);
    transform: translateY(-50%);
    width: min(360px, 40vw); max-height: 64vh;
    z-index: 110; pointer-events: none;
    opacity: 0; transition: opacity .35s;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    padding: 28px 26px;
    border-radius: 18px;
    /* 暗底 scrim：只在歌词区域压暗背景卡片墙，避免被抢视觉(#6)；
       从右向左渐隐，与背景自然融合，不做硬边框 */
    background:
      radial-gradient(120% 90% at 70% 50%, rgba(6,6,12,0.72) 0%, rgba(6,6,12,0.5) 45%, rgba(6,6,12,0) 100%);
    -webkit-backdrop-filter: blur(3px);
            backdrop-filter: blur(3px);
    /* 上下淡出，正文不被截断(#5)：mask 只作用纵向，横向留足 padding */
    -webkit-mask-image: linear-gradient(transparent, #000 14%, #000 86%, transparent);
            mask-image: linear-gradient(transparent, #000 14%, #000 86%, transparent);
    overflow: hidden;
  }
  #lyrics-panel.on { opacity: 1; }

// 上传歌单（#1）：换墙 + 真实时长
// ───────────────────────────────────────────────────────────
// 默认墙保留为上面的 TRACKS。若 localStorage 里存了用户上传过的歌单
// （已规范化为墙所需结构），就在「建墙代码运行之前」整体替换 TRACKS /
// DURATIONS，建墙逻辑完全不改、照常从 TRACKS 同步构建。
//   - 网络请求只在「粘链接载入」那一刻发生（见底部 loadPlaylistFromUrl），
//     成功后把规范化结果写进 localStorage 再 reload；
//   - 普通刷新走的是这里的同步读取，无需 await，建墙路径零改动。
// API 返回的 ar 是字符串、含 dt(ms)；墙需要 ar 数组 + alName + fee。
// ═══════════════════════════════════════════════════════════
const PLAYLIST_CACHE_KEY = 'muzic_playlist_v1';
let WALL_NAME = '治愈系歌单';
let WALL_SUB  = '78 首 · 治愈纯音乐';

// API track → 墙结构；同时回填 DURATIONS[id]=秒
function normalizeApiTrack(t) {
  if (t.dt) DURATIONS[t.id] = Math.round(t.dt / 1000);
  const arArr = typeof t.ar === 'string'
    ? t.ar.split(' / ').filter(Boolean)
    : (Array.isArray(t.ar) ? t.ar : ['未知']);
  return {
    id: t.id,
    name: t.name || '未知',
    ar: arArr.length ? arArr : ['未知'],
    alName: t.alName || t.name || '未知',
    alPicUrl: t.alPicUrl || '',
    fee: typeof t.fee === 'number' ? t.fee : 0,
  };
}

(function applyStoredPlaylist() {
  try {
    const raw = localStorage.getItem(PLAYLIST_CACHE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || !Array.isArray(data.tracks) || data.tracks.length === 0) return;
    DURATIONS = {};
    TRACKS = data.tracks.map(normalizeApiTrack);
    WALL_NAME = data.name || '我的歌单';
    WALL_SUB  = `${TRACKS.length} 首` + (data.truncated ? ` · 已截断到 ${TRACKS.length}` : '');
  } catch (e) {
    // 缓存坏了就回退默认墙，不影响启动
    console.warn('playlist cache parse failed, fallback to default wall', e);
  }
})();

// ═══════════════════════════════════════════════════════════
// POST-PROCESSING  —  EffectComposer + BokehPass
// ═══════════════════════════════════════════════════════════
// BokehPass uses depth buffer to compute per-pixel blur.
// focus: NDC depth value 0-1 (1=far). For our scene (near=0.5,far=120):
// Objects at ~20 units → NDC depth ≈ (120+0.5-2*0.5*120/20)/(120-0.5) ≈ 0.952
// Objects at ~50 units → NDC depth ≈ 0.982
// We focus at 0.97 (≈25-30 units, near cluster zone)
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bokehPass = new THREE.BokehPass(scene, camera, {
  focus:    0.97,    // NDC focus depth (near clusters)
  aperture: 0.004,   // aperture: higher = more blur for out-of-focus objects
  maxblur:  0.014,   // max blur radius (fraction of screen)
  width: W, height: H
});
bokehPass.renderToScreen = true;
composer.addPass(bokehPass);

const _defaultStarColor = new THREE.Color(0xffffff);

// 从封面图采样主色（取较饱和、较亮的平均色）。封面跨域，需 crossOrigin。
function extractCoverColor(url) {
  if (!url) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const s = 24;
      const cv = document.createElement('canvas'); cv.width = cv.height = s;
      const cx = cv.getContext('2d');
      cx.drawImage(img, 0, 0, s, s);
      const d = cx.getImageData(0, 0, s, s).data;
      let r = 0, g = 0, b = 0, wsum = 0;
      for (let i = 0; i < d.length; i += 4) {
        const rr = d[i], gg = d[i+1], bb = d[i+2];
        const mx = Math.max(rr, gg, bb), mn = Math.min(rr, gg, bb);
        const sat = mx === 0 ? 0 : (mx - mn) / mx;
        // 加权：偏向有色彩、不太暗也不死白的像素
        const w = sat * (mx / 255) * (1 - Math.abs(mx - 150) / 255) + 0.05;
        r += rr * w; g += gg * w; b += bb * w; wsum += w;
      }
      if (wsum > 0) {
        r /= wsum; g /= wsum; b /= wsum;
        // 提亮一点保证发光感
        const boost = 1.25;
        fxColorTarget.setRGB(
          Math.min(1, r/255*boost), Math.min(1, g/255*boost), Math.min(1, b/255*boost)
        );
      }
    } catch (e) { /* 跨域取色失败就保持上一色 */ }
  };
  img.src = url;
}

// ═══════════════════════════════════════════════════════════
// 封面动效（#5）：把焦点卡封面切成 N×N 碎片，播放时按伪节奏
// 飘出/旋转/外扩再聚拢 + 一道从中心扩散的波纹。整张图操作，不抠图层。
// 取不到跨域像素时自动降级（隐藏画布，静态封面照常显示）。
// ═══════════════════════════════════════════════════════════
const coverFX = (() => {
  const canvas = document.getElementById('fc-fx');
  const ctx = canvas ? canvas.getContext('2d') : null;
  const GRID = 14;                 // 14×14 = 196 碎片
  let img = null;                  // 当前封面 Image
  let ready = false;               // 当前封面能否用于绘制（CORS 通过 + 已解码）
  let cells = [];                  // 网格（所有封面通用，只建一次）
  let size = 0;                    // 画布像素边长

  // 封面缓存：url → { im:Image, ok:bool }。载墙时后台预解码，选中时零等待。
  const cache = new Map();

  function buildCells() {
    cells = [];
    for (let gy = 0; gy < GRID; gy++) {
      for (let gx = 0; gx < GRID; gx++) {
        const cx = (gx + 0.5) / GRID - 0.5;   // -0.5..0.5 相对中心
        const cy = (gy + 0.5) / GRID - 0.5;
        cells.push({
          gx, gy,
          dist: Math.hypot(cx, cy),            // 离中心距离（波纹用）
          ang: Math.atan2(cy, cx),             // 朝外方向（外扩用）
          phase: Math.random() * Math.PI * 2,  // 个体相位（错落）
          spin: (Math.random() - 0.5),         // 自转方向
        });
      }
    }
  }
  buildCells();   // 网格对所有封面一致，初始化时建一次即可

  // 预解码一张封面进缓存（已在缓存则跳过）。返回 Promise 便于批量。
  function preloadOne(url) {
    if (!url || cache.has(url)) return Promise.resolve();
    return new Promise((resolve) => {
      const im = new Image();
      im.crossOrigin = 'anonymous';
      im.onload = () => { cache.set(url, { im, ok: true }); resolve(); };
      im.onerror = () => { cache.set(url, { im: null, ok: false }); resolve(); };
      im.src = url;
    });
  }

  // 载墙时调用：后台静默预加载全部封面（不阻塞页面），小并发避免一次几十个请求拥塞
  async function preloadAll(urls) {
    const list = [...new Set(urls.filter(Boolean))];
    const CONCURRENCY = 6;
    let i = 0;
    async function worker() {
      while (i < list.length) {
        const u = list[i++];
        await preloadOne(u);
      }
    }
    const workers = [];
    for (let k = 0; k < CONCURRENCY; k++) workers.push(worker());
    await Promise.all(workers);
  }

  function setCover(url) {
    ready = false; img = null;
    if (!canvas || !ctx || !url) return;
    const hit = cache.get(url);
    if (hit) {
      // 缓存命中：已解码，立即可用，零等待
      if (hit.ok && hit.im) { img = hit.im; ready = true; }
      return;
    }
    // 未命中（极少数，预加载没覆盖到）：现下载，回填缓存
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => { cache.set(url, { im, ok: true }); img = im; ready = true; };
    im.onerror = () => { cache.set(url, { im: null, ok: false }); ready = false; };
    im.src = url;
  }

  function resize() {
    if (!canvas) return;
    const r = canvas.getBoundingClientRect();
    size = Math.max(2, Math.round(r.width));
    canvas.width = size; canvas.height = size;
  }

  // pulse: 0..1 律动强度；st: 秒。返回是否成功绘制（否则调用方隐藏画布）
  function render(st, pulse) {
    if (!canvas || !ctx || !ready || !img) return false;
    if (canvas.width < 2) resize();
    const N = GRID, cell = size / N;
    ctx.clearRect(0, 0, size, size);

    // 波纹：从中心向外扩散的环（周期循环）
    const wavePos = (st * 0.35) % 1;            // 0..1 环的当前半径
    const amp = pulse;                          // 整体位移幅度跟随律动

    const iw = img.width, ih = img.height;
    // 用 cover 方式把方图映射到正方源（取中心正方形）
    const srcSize = Math.min(iw, ih);
    const srcX0 = (iw - srcSize) / 2, srcY0 = (ih - srcSize) / 2;
    const sCell = srcSize / N;

    for (const c of cells) {
      // 波纹：当环经过该块时给一个外推脉冲
      const ring = 1 - Math.min(1, Math.abs(c.dist / 0.71 - wavePos) * 6);
      const ripple = Math.max(0, ring);
      // 个体浮动（错落的呼吸）
      const fl = Math.sin(st * 2.4 + c.phase);
      // 外扩位移：方向朝外，量 = (波纹 + 浮动) × 律动
      const push = (ripple * 0.5 + (fl * 0.5 + 0.5) * 0.22) * amp * cell * 1.6;
      const ox = Math.cos(c.ang) * push;
      const oy = Math.sin(c.ang) * push;
      // 轻微缩放 + 自转
      const sc = 1 + (ripple * 0.18 + 0.06 * fl) * amp;
      const rot = (c.spin * (ripple * 0.5 + 0.12 * fl)) * amp;

      const dx = c.gx * cell + cell / 2 + ox;
      const dy = c.gy * cell + cell / 2 + oy;
      const dw = cell * sc + 0.6;               // +0.6 消除缝隙
      const dh = cell * sc + 0.6;

      ctx.save();
      ctx.translate(dx, dy);
      if (rot) ctx.rotate(rot);
      ctx.globalAlpha = 1;
      ctx.drawImage(
        img,
        srcX0 + c.gx * sCell, srcY0 + c.gy * sCell, sCell, sCell,
        -dw / 2, -dh / 2, dw, dh
      );
      ctx.restore();
    }
    return true;
  }

  window.addEventListener('resize', resize);
  return { setCover, render, resize, preloadAll };
})();

function seededRnd(s) { return ((s * 1664525 + 1013904223) & 0x7fffffff) / 0x7fffffff; }
const PALETTE = [0x1a1a2e,0x16213e,0x0f3460,0x533483,0x2b2d42,0x3d405b,0x293241,0x1b4332,0x3b1f2b,0x2c3e50];
function phColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (Math.imul(31,h) + name.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}

// ═══════════════════════════════════════════════════════════
// AUTO CONSTELLATION（Task 2）
// ───────────────────────────────────────────────────────────
// 不再依赖任何硬编码艺人坐标。每当 TRACKS 变化（包括上传新歌单后
// reload），就根据「当前歌单实际出现的艺人列表」确定性地模拟生成
// 一套星座坐标，写入 CLUSTER。
//   · 确定性：用艺人名做字符串哈希当种子 → 同一歌单每次刷新星座一致，
//     不会每帧乱跳；不同歌单自然得到不同星座。
//   · 分布：黄金角螺旋 + 按序推远 Z，artist 越多铺得越深，天然不挤成一团。
//   · 健壮：艺人数 1 首也有坐标；空歌单不报错。
// ═══════════════════════════════════════════════════════════
function strSeed(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h & 0x7fffffff);
}

function buildConstellation() {
  // 清空（reload 后 CLUSTER 是新的空对象，这里幂等保险）
  for (const k of Object.keys(CLUSTER)) delete CLUSTER[k];

  const names = Object.keys(ARTISTS);
  const n = Math.max(1, names.length);
  const GOLDEN = 2.39996323;           // 黄金角，避免艺人簇彼此对齐

  // 艺人越多，整体铺得越开（半径/纵深/上下都按数量放大），
  // 否则几十个艺人挤在小半径里、投影到屏幕会糊成一团。
  // n≈10 → 适中；n≈44(默认治愈墙) → 明显铺开。
  const spread = Math.min(2.2, 0.8 + n / 30);   // 0.8 → 2.2 的放大系数
  const RAD_BASE = 10 * spread;
  const RAD_GROW = 26 * spread;        // 外圈艺人离中心更远
  const Z_START  = -14;
  const Z_SPAN   = 70 * spread;        // 纵深也随数量拉长
  const Y_SPREAD = 16 * spread;        // 上下散开幅度

  names.forEach((name, i) => {
    const s = strSeed(name);
    const t = i / n;                   // 0..1 归一化序号
    // 螺旋角度：序号驱动主结构 + 名字哈希做个性扰动
    const ang = i * GOLDEN + (seededRnd(s) - 0.5) * 0.6;
    // 半径随序号缓增（用 sqrt 让外圈不过度密集），叠加哈希扰动
    const rad = RAD_BASE + Math.sqrt(t) * RAD_GROW + (seededRnd(s * 3) - 0.5) * 5;
    // Z 按序推远，artist 多则铺得深；叠加哈希扰动避免成同心圆盘
    const z = Z_START - t * Z_SPAN - (seededRnd(s * 7)) * 8;
    const y = (seededRnd(s * 11) - 0.5) * Y_SPREAD;   // 上下散开，形成立体星座
    CLUSTER[name] = {
      x: +(Math.cos(ang) * rad).toFixed(2),
      y: +y.toFixed(2),
      z: +z.toFixed(2),
    };
  });
}
buildConstellation();

function clusterOf(name) {
  // 正常情况下 buildConstellation 已为每个艺人建好坐标；
  // 万一遇到未登记艺人（理论上不会），用名字哈希现算一个兜底坐标。
  if (CLUSTER[name]) return CLUSTER[name];
  const s = strSeed(name || 'unknown');
  const a = s * 2.399;
  const c = { x: Math.cos(a) * 18, y: (seededRnd(s * 77) - 0.5) * 10, z: -(seededRnd(s * 99) * 55 + 20) };
  CLUSTER[name] = c;
  return c;
}

// C3-B size layers: scale based on cluster Z depth.
// Near clusters (z≈-12 to -20): scale 1.8–2.8  → LARGE
// Mid clusters  (z≈-30 to -50): scale 0.9–1.4  → MEDIUM
// Far clusters  (z≈-55 to -80): scale 0.35–0.65 → SMALL thumbnails
//
// depth range: z_near=-12, z_far=-80  → range=68
// depthFactor = clamp((z - z_far)/(z_near - z_far), 0,1)  → 1=near, 0=far
//
const Z_NEAR_REF = -12, Z_FAR_REF = -80;
const meshes = [];

// ── 簇内打散：同艺人簇内，同专辑的卡轮流交错，避免相邻同封面 ──
const declusterOrder = {};   // artist -> 该艺人卡片的打散后顺序（原 TRACKS index 数组）
Object.entries(ARTISTS).forEach(([ar, indices]) => {
  const buckets = {};
  indices.forEach(idx => { const k = TRACKS[idx].alName; (buckets[k] = buckets[k] || []).push(idx); });
  const keys = Object.keys(buckets);
  const out = [];
  while (out.length < indices.length) {
    for (const k of keys) { if (buckets[k].length) out.push(buckets[k].shift()); }
  }
  declusterOrder[ar] = out;
});

// ═══════════════════════════════════════════════════════════
// CARD COLLISION / 去重叠（Task 3）
// ───────────────────────────────────────────────────────────
// 不引入实时刚体物理（卡片是始终正对相机的 billboard 平面，跑物理引擎
// 是杀鸡用牛刀，还会拖帧）。改用「一次性松弛 (relaxation) 排斥」：
//   · 把每张卡近似成一个球，半径 = 卡片缩放后的半对角线 + 余量；
//     因为卡片永远正对相机，球近似就是最坏情况下的精确包围体。
//   · 多轮迭代：任意两卡球心距 < 半径之和，就沿连线把两者对半推开；
//     推开量留一点松弛系数，避免抖动。
//   · 余量额外吃掉「呼吸漂浮」的振幅(ampX/ampY≈0.4)，保证运行时漂浮
//     也不会再嵌进彼此。
//   · 只在建墙时跑一次，运行时零开销；之后 cardBase 快照记录的就是
//     这套去重叠后的坐标。
// ═══════════════════════════════════════════════════════════
(function relaxCardOverlap() {
  const N = meshes.length;
  if (N < 2) return;

  const BREATH_MARGIN = 0.5;     // 吃掉呼吸漂浮振幅 + 一点视觉间距
  const HALF_DIAG = Math.SQRT2 * 0.5 * BASE_CARD;  // 单位卡半对角线
  // 每张卡的碰撞半径（含缩放与余量）
  const rad = meshes.map(m => HALF_DIAG * m.userData.baseScale + BREATH_MARGIN);

  const ITER = 14;               // 迭代轮数：够收敛，又不至于太慢
  const PUSH = 0.5;              // 每次把重叠量推开的比例（双方各推一半）
  const v = new THREE.Vector3();

  for (let iter = 0; iter < ITER; iter++) {
    let moved = false;
    for (let i = 0; i < N; i++) {
      const pi = meshes[i].position, ri = rad[i];
      for (let j = i + 1; j < N; j++) {
        const pj = meshes[j].position, rj = rad[j];
        const minD = ri + rj;
        // 先用 AABB 粗筛，省掉大量开方
        const dx = pj.x - pi.x, dy = pj.y - pi.y, dz = pj.z - pi.z;
        if (Math.abs(dx) > minD || Math.abs(dy) > minD || Math.abs(dz) > minD) continue;
        let d2 = dx*dx + dy*dy + dz*dz;
        if (d2 >= minD * minD) continue;            // 没重叠
        let d = Math.sqrt(d2);
        if (d < 1e-4) {                              // 完全重合：给个确定性微扰
          v.set(seededRnd(i*31+j)-0.5, seededRnd(i*37+j)-0.5, seededRnd(i*41+j)-0.5);
          if (v.lengthSq() < 1e-6) v.set(1, 0, 0);
          v.normalize();
          d = 1e-4;
        } else {
          v.set(dx/d, dy/d, dz/d);
        }
        const overlap = (minD - d) * PUSH;
        // 大卡更重、推得少；小卡推得多（按半径反比分摊），整体更稳
        const wi = rj / minD, wj = ri / minD;
        pi.x -= v.x * overlap * wi; pi.y -= v.y * overlap * wi; pi.z -= v.z * overlap * wi;
        pj.x += v.x * overlap * wj; pj.y += v.y * overlap * wj; pj.z += v.z * overlap * wj;
        moved = true;
      }
    }
    if (!moved) break;            // 提前收敛
  }
})();

});

const _lv = new THREE.Vector3();
// 标签屏幕去重叠：因为不同深度的簇中心投影到屏幕后 (x,y) 可能彼此叠在
// 一起（卡片做了 3D 去重叠，但标签钉的是裸簇心坐标），这里在屏幕空间
// 再做一遍轻量分离——把投影后相互压住的标签沿 Y 轴推开，文字就不糊成
// 一团。只对当前可见、且离相机够近（opacity>0）的标签做，开销很小。
const LABEL_H = 26;   // 单个标签的近似高度（点+名+计数三行）
const LABEL_W = 130;  // 近似宽度，用于判断是否"水平也挨着"才需要竖直推开
function updateLabels() {
  const W2 = window.innerWidth, H2 = window.innerHeight;

  // 1) 先投影，收集可见标签的屏幕坐标
  const vis = [];
  Object.entries(CLUSTER).forEach(([name, ctr]) => {
    const el = labelEls[name]; if (!el) return;
    _lv.set(ctr.x, ctr.y + 6, ctr.z);
    _lv.project(camera);
    if (_lv.z > 1) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; return; }
    const x = (_lv.x * .5 + .5) * W2;
    const y = (-_lv.y * .5 + .5) * H2;
    const dist = Math.sqrt((ctr.x-camX)**2 + (ctr.y-camY)**2 + (ctr.z-camZ)**2);
    const op = Math.max(0, Math.min(.85, 1.1 - dist/65));
    if (op <= 0.01) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; return; }
    vis.push({ el, x, y, dist, op });
  });

  // 2) 屏幕空间竖直分离：按 y 排序，多轮把相互压住的标签推开。
  //    只有当两标签 X 也足够接近（会真的视觉重叠）时才推，避免无谓抖动。
  vis.sort((a, b) => a.y - b.y);
  for (let iter = 0; iter < 6; iter++) {
    let moved = false;
    for (let i = 0; i < vis.length - 1; i++) {
      const a = vis[i], b = vis[i + 1];
      if (Math.abs(a.x - b.x) > LABEL_W) continue;   // 水平没挨着，不会重叠
      const gap = b.y - a.y;
      if (gap < LABEL_H) {
        const push = (LABEL_H - gap) / 2;
        a.y -= push; b.y += push;
        moved = true;
      }
    }
    if (!moved) break;
  }

  // 3) 落位：近的标签层级更高，保证它压在远的之上
  vis.forEach(v => {
    v.el.style.left = v.x + 'px';
    v.el.style.top  = v.y + 'px';
    v.el.style.opacity = v.op;
    v.el.style.pointerEvents = 'auto';
    v.el.style.zIndex = String(1000 - Math.round(v.dist));
  });
}

// ═══════════════════════════════════════════════════════════
// CAMERA CONTROL
// ═══════════════════════════════════════════════════════════
let camX = 0, camY = 8, camZ = 5;
let velX = 0, velY = 0;
let dragging = false, lastMX = 0, lastMY = 0;
let flyTarget = null;

function applyCamera() {
  camera.position.set(camX, camY, camZ);
  camera.lookAt(camX, camY - 10, camZ - 28);
}
applyCamera();

document.addEventListener('mousedown', e => {
  if (e.target.closest('#focus-card') || e.target.closest('#toolbar')) return;
  dragging = true; velX = velY = 0;
  lastMX = e.clientX; lastMY = e.clientY;
  document.body.classList.add('drag');
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX-lastMX, dy = e.clientY-lastMY;
  camX -= dx*.04; camY += dy*.03;
  velX = -dx*.04; velY = dy*.03;
  lastMX = e.clientX; lastMY = e.clientY;
});
document.addEventListener('mouseup', () => { dragging = false; document.body.classList.remove('drag'); });
document.addEventListener('touchstart', e => {
  dragging = true; velX = velY = 0;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dx = e.touches[0].clientX-lastMX, dy = e.touches[0].clientY-lastMY;
  camX -= dx*.04; camY += dy*.03; velX = -dx*.04; velY = dy*.03;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', () => { dragging = false; });
document.addEventListener('wheel', e => {
  // 在歌单面板/歌词面板内滚动时，交给原生滚动，不缩放相机(#1)
  if (e.target.closest && (e.target.closest('#playlist-panel') || e.target.closest('#lyrics-panel'))) return;
  e.preventDefault();
  camZ -= e.deltaY * .055;
  // 软边界：不硬截断，越界后由 animate() 橡皮筋拉回
}, { passive: false });

// ═══════════════════════════════════════════════════════════
// DEPTH BRIGHTNESS  (fake DOF layer — distance darkening)
// Works alongside BokehPass: far cards are dark + blurry.
// ═══════════════════════════════════════════════════════════
function updateDepth() {
  const cx = camX, cy = camY, cz = camZ;
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    const d = Math.sqrt((m.position.x-cx)**2+(m.position.y-cy)**2+(m.position.z-cz)**2);
    m.material.color.setScalar(Math.max(0.07, 1.0 - d/80));
  }
}

// ── 每张卡的固定个性偏转（一次性生成，不随帧变，避免抖动）──
const cardTilt = meshes.map((_, i) => ({
  rx: (seededRnd(i*7+3) - 0.5) * 0.50,
  ry: (seededRnd(i*7+4) - 0.5) * 0.70,
  rz: (seededRnd(i*7+5) - 0.5) * 0.34,
}));

// ── #11 呼吸感：记录每张卡基准位置 + 随机相位/速度，animate 里叠加极轻浮动 ──
const cardBase = meshes.map(m => m.position.clone());
const cardBreath = meshes.map((_, i) => ({
  phase: seededRnd(i*13+2) * Math.PI * 2,
  speed: 0.35 + seededRnd(i*13+5) * 0.4,        // 慢，呼吸节奏
  ampX:  0.10 + seededRnd(i*13+7) * 0.18,
  ampY:  0.14 + seededRnd(i*13+9) * 0.22,
  ampS:  0.010 + seededRnd(i*13+11) * 0.015,    // 极轻缩放呼吸
}));
function updateBreath(t) {
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    if (m === focusedMesh) continue;             // 聚焦卡不漂
    const b = cardBreath[i], base = cardBase[i];
    const ph = t * b.speed + b.phase;
    m.position.x = base.x + Math.sin(ph) * b.ampX;
    m.position.y = base.y + Math.cos(ph * 0.9) * b.ampY;
  }
}

// ── billboard 基准朝向 + 叠加固定偏转 ──
function updateBillboard() {
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    m.lookAt(camera.position);
    if (m === focusedMesh) continue;     // 聚焦卡：只正对相机，不加个性偏转
    m.rotateX(cardTilt[i].rx);
    m.rotateY(cardTilt[i].ry);
    m.rotateZ(cardTilt[i].rz);
  }
}

let focusedMesh = null;

// ── Player state ──

const pbThumb     = document.getElementById('pb-thumb');
const pbTitle     = document.getElementById('pb-title');
const pbArtist    = document.getElementById('pb-artist');
const pbPlay      = document.getElementById('pb-play');
const pbPrev      = document.getElementById('pb-prev');
const pbNext      = document.getElementById('pb-next');

let currentTrackIdx = -1;
let isPlaying = false;

const pbProgressFill = document.getElementById('pb-progress-fill');
const pbCur = document.getElementById('pb-cur');
const pbDur = document.getElementById('pb-dur');
let progressTimer = null;
let playElapsed = 0;          // 本地计时（秒）— 近似，暂停/拖动会漂移
let curDuration = 240;        // 当前曲时长（秒），有 DURATIONS 用真值否则回退
const DEFAULT_DURATION = 240;

function fmtTime(s) {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  return `${m}:${ss}`;
}

function startProgress() {
  if (progressTimer) clearInterval(progressTimer);
  playElapsed = 0;
  pbProgressFill.style.width = '0%';
  pbCur.textContent = '0:00';
  pbDur.textContent = fmtTime(curDuration);
  progressTimer = setInterval(() => {
    playElapsed++;
    const pct = Math.min(100, (playElapsed / curDuration) * 100);
    pbProgressFill.style.width = pct + '%';
    pbCur.textContent = fmtTime(playElapsed);
    syncLyrics(playElapsed);
    if (playElapsed >= curDuration) {
      clearInterval(progressTimer);
      progressTimer = null;
      advanceNext();   // 播完自动切下一首（按 loopMode/shuffle）
    }
  }, 1000);
}

function stopProgress() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  pbProgressFill.style.width = '0%';
  pbCur.textContent = '0:00';
}

function updateScrollTitle(text) {
  pbTitle.classList.remove('scrolling');
  pbTitle.textContent = text;
  pbTitle.style.removeProperty('--scroll-dist');
  // 下一帧测量是否溢出
  requestAnimationFrame(() => {
    const overflow = pbTitle.scrollWidth - pbTitle.clientWidth;
    if (overflow > 4) {
      pbTitle.style.setProperty('--scroll-dist', `-${overflow + 8}px`);
      pbTitle.classList.add('scrolling');
    }
  });
}

// ── #9 歌词：解析 lrc、渲染、按时间轴高亮 ──
const lyricsPanel = document.getElementById('lyrics-panel');
const lpScroll    = document.getElementById('lp-scroll');
let lyricsOn = true;           // 选中卡片后歌词默认显示(#2)；由歌词面板的关闭按钮独立关闭
let parsedLyrics = [];         // [{t: 秒, text}] — 仅 synced 时有时间
let lyricActiveIdx = -1;
let lyricSynced = false;       // 当前歌词是否带时间戳（决定能否高亮）

function parseLrc(lrc) {
  const out = [];
  if (!lrc) return out;
  lrc.split('\n').forEach(line => {
    const m = line.match(/^\[(\d{1,2}):(\d{1,2})(?:\.(\d{1,3}))?\](.*)$/);
    if (!m) return;
    const t = parseInt(m[1]) * 60 + parseInt(m[2]) + (m[3] ? parseInt(m[3].padEnd(3,'0')) / 1000 : 0);
    const text = m[4].trim();
    out.push({ t, text });
  });
  out.sort((a, b) => a.t - b.t);
  return out;
}

// 无时间戳的纯文本歌词：去掉元信息行，留正文
function plainLines(lrc) {
  if (!lrc) return [];
  return lrc.split('\n')
    .map(l => l.replace(/^\[[a-z]+:.*\]$/i, '').trim())
    .filter(l => l.length > 0);
}

// 三态渲染：synced=逐行可高亮 / 有词无时间戳=静态全文 / 无词=暂无歌词
function renderLyrics() {
  lyricActiveIdx = -1;
  lpScroll.innerHTML = '';
  lpScroll.classList.toggle('static', !lyricSynced);

  if (lyricSynced && parsedLyrics.length) {
    parsedLyrics.forEach((ln, i) => {
      const d = document.createElement('div');
      d.className = 'lp-line';
      d.dataset.i = i;
      d.textContent = ln.text || '· · ·';
      lpScroll.appendChild(d);
    });
    lpScroll.style.transform = 'translateY(0)';
    return;
  }

  // 有词但无时间戳 → 静态显示全文（不高亮、不跟随）
  if (!lyricSynced && parsedLyrics.length) {
    parsedLyrics.forEach(ln => {
      const d = document.createElement('div');
      d.className = 'lp-line lp-plain';
      d.textContent = ln.text;
      lpScroll.appendChild(d);
    });
    lpScroll.style.transform = 'translateY(0)';
    return;
  }

  // 真没词 / 纯音乐
  lpScroll.innerHTML = '<div id="lp-empty">暂无歌词</div>';
  lpScroll.style.transform = 'translateY(0)';
}

// 把后端返回（或缓存）的歌词对象装进当前状态
function applyLyricData(d) {
  // d: {lrc, hasLyric, synced}
  if (!d || !d.hasLyric) { lyricSynced = false; parsedLyrics = []; return; }
  if (d.synced) {
    lyricSynced = true;
    parsedLyrics = parseLrc(d.lrc);
    // 解析后若一行都没有（极端格式），降级成纯文本
    if (!parsedLyrics.length) { lyricSynced = false; parsedLyrics = plainLines(d.lrc).map(t => ({ t: 0, text: t })); }
  } else {
    lyricSynced = false;
    parsedLyrics = plainLines(d.lrc).map(t => ({ t: 0, text: t }));
  }
}

// 懒加载：LYRICS[id] 没缓存就按需拉 /api/lyric；_lyricReqId 防快速切歌竞态。
// 缓存值是对象 {lrc, hasLyric, synced}（含「确认无词」的负缓存）。
let _lyricReqId = 0;
function loadLyrics(track) {
  const cached = LYRICS[track.id];
  if (cached !== undefined) {
    applyLyricData(typeof cached === 'string' ? { lrc: cached, hasLyric: !!cached, synced: true } : cached);
    renderLyrics();
    return;
  }

  // 未缓存 → 载入态 + 异步拉
  lyricSynced = false; parsedLyrics = []; lyricActiveIdx = -1;
  lpScroll.classList.remove('static');
  lpScroll.innerHTML = '<div id="lp-empty">载入歌词…</div>';

  const reqId = ++_lyricReqId;
  const wantId = track.id;
  fetch('/api/lyric?id=' + encodeURIComponent(track.id))
    .then(r => r.json())
    .then(data => {
      const entry = (data && data.ok)
        ? { lrc: data.lrc || '', hasLyric: !!data.hasLyric, synced: !!data.synced }
        : { lrc: '', hasLyric: false, synced: false };
      LYRICS[wantId] = entry;   // 负缓存也存，避免反复拉
      if (reqId !== _lyricReqId || currentTrackIdx < 0 || TRACKS[currentTrackIdx]?.id !== wantId) return;
      applyLyricData(entry);
      renderLyrics();
    })
    .catch(() => {
      // 网络/接口异常：不写负缓存（下次还能重试），仅当前显示暂无
      if (reqId !== _lyricReqId || TRACKS[currentTrackIdx]?.id !== wantId) return;
      lyricSynced = false; parsedLyrics = [];
      renderLyrics();
    });
}

function syncLyrics(sec) {
  if (!lyricsOn || !lyricSynced || !parsedLyrics.length) return;
  let idx = -1;
  for (let i = 0; i < parsedLyrics.length; i++) {
    if (parsedLyrics[i].t <= sec) idx = i; else break;
  }
  if (idx === lyricActiveIdx) return;
  lyricActiveIdx = idx;
  const lines = lpScroll.children;
  for (let i = 0; i < lines.length; i++) lines[i].classList.toggle('active', i === idx);
  // 让当前行居中：按行高估算偏移
  if (idx >= 0 && lines[idx]) {
    const lineH = lines[idx].offsetTop;
    lpScroll.style.transform = `translateY(${ -lineH + 110 }px)`;
  }
}

function applyLyricsVisibility() {
  // 歌词显示只看用户是否开启，独立于焦点卡开合(#1)
  if (lyricsOn) lyricsPanel.classList.add('on');
  else lyricsPanel.classList.remove('on');
}


function loadTrack(idx, autoplay) {
  if (idx < 0 || idx >= TRACKS.length) return;
  currentTrackIdx = idx;
  const track = TRACKS[idx];
  curDuration = DURATIONS[track.id] || DEFAULT_DURATION;   // #8 真实时长 or 回退
  loadLyrics(track);                                        // #9 装载歌词
  pbDur.textContent = fmtTime(curDuration);
  // 更新 focus card（切歌时也唤出大卡，新歌专辑卡始终显示）
  fcImg.src            = track.alPicUrl;
  extractCoverColor(track.alPicUrl);   // 取封面主色驱动光场/星空(A/B)
  coverFX.setCover(track.alPicUrl);    // 封面碎片动效(#5)
  requestAnimationFrame(() => coverFX.resize());  // 卡片就位后按实际尺寸初始化画布
  fcTitle.textContent  = track.name;
  fcArtist.textContent = track.ar.join(' / ');
  fcYear.textContent   = track.alName;
  focusMode = true;
  focusCard.classList.add('on');
  toolbar.classList.add('hidden');
  crosshair.classList.add('hidden');
  applyLyricsVisibility();
  // 同步更新 focusedMesh + playingMesh（playingMesh 在关卡后仍保留，用于背景光照#4）
  const mesh = meshes.find(m => m.userData.track && m.userData.track.id === track.id);
  if (mesh) { focusedMesh = mesh; playingMesh = mesh; }
  // 更新 player bar
  pbThumb.src          = track.alPicUrl;
  updateScrollTitle(track.name);
  pbArtist.textContent = track.ar.join(' / ');
  playerBar.classList.add('on');
  renderPlaylist();      // 高亮当前曲
  isPlaying = false;
  pbPlay.innerHTML = '&#9654;';
  stopProgress();
}

function enterFocus(track) {
  focusMode = true;
  lyricsOn = true;         // 选中卡片 → 歌词默认显示(#2)
  togglePlaylist(false);   // #2 选歌后自动收起歌单
  const idx = TRACKS.findIndex(t => t.id === track.id);
  loadTrack(idx, true);
  focusCard.classList.add('on');
  toolbar.classList.add('hidden');
  crosshair.classList.add('hidden');
  applyLyricsVisibility();
  // 付费歌（fee=1会员 / fee=4数字专辑）：弹拦截窗，不直接播。
  // 已知代价：区分不了"用户买没买"，已购买的歌也会被拦（fee + 跨域 iframe 无登录态所限）。
  if (isVip(track)) {
    showVipPop();
  } else {
    hideVipPop();
    playCurrent();   // 点卡即播（仍在用户手势栈内，稳定出声）
  }
}

// ── 会员/付费歌判定与拦截 ──
// fee: 0免费 / 1会员 / 4数字专辑(付费) / 8低音质免费
function isVip(track) { return track && (track.fee === 1 || track.fee === 4); }

// 从 idx 之后找下一首非付费歌（循环一圈，找不到返回 -1）
function nextFreeIdx(fromIdx) {
  for (let step = 1; step <= TRACKS.length; step++) {
    const j = (fromIdx + step) % TRACKS.length;
    if (!isVip(TRACKS[j])) return j;
  }
  return -1;
}

function showVipPop() {
  const el = document.getElementById('vip-pop');
  if (el) el.classList.add('on');
  setPlayingUI(false);
  stopProgress();
}

function hideVipPop() {
  const el = document.getElementById('vip-pop');
  if (el) el.classList.remove('on');
}

function exitFocus() {
  focusMode = false;
  focusedMesh = null;
  focusCard.classList.remove('on');
  toolbar.classList.remove('hidden');
  crosshair.classList.remove('hidden');
  // 不再联动关闭歌词(#1)：歌词由自己的关闭按钮独立控制
  // 不清 playingMesh：背景墙里当前播放的卡保留选中光照(#4)
  hideVipPop();
  // player bar 保留，embed 继续发声
}

// fc-close 的 HTML 在脚本标签之后，延迟到 window load 后再绑定。
window.addEventListener('load', () => {
  document.getElementById('fc-close')?.addEventListener('click', exitFocus);
  // 付费拦截窗按钮（HTML 在脚本之后，延迟到 load 后绑定）
  document.getElementById('vip-login')?.addEventListener('click', () => {
    // 跳转网易云登录（新标签页），登录后回本站再点播放即可继承登录态
    window.open('https://music.163.com/#/login', '_blank');
  });
  document.getElementById('vip-skip')?.addEventListener('click', () => {
    hideVipPop();
    const j = nextFreeIdx(currentTrackIdx);
    if (j < 0) return;   // 整张歌单都是付费 → 没有可跳的免费歌
    const t = TRACKS[j];
    const mesh = meshes.find(m => m.userData.track && m.userData.track.id === t.id);
    if (mesh) {
      focusedMesh = mesh;
      const p = mesh.position;
      flyTarget = { x: camX + (p.x-camX)*0.6, y: camY + (p.y-camY)*0.6, z: Math.max(p.z + 9, camZ - 22) };
    }
    enterFocus(t);
  });
});

// 播放/暂停 UI 状态集中处理（含 #3 左下角图标转动）
const uAv = document.getElementById('u-av');
function setPlayingUI(on) {
  isPlaying = on;
  pbPlay.innerHTML = on ? '&#9646;&#9646;' : '&#9654;';
  if (on) uAv.classList.add('spinning'); else uAv.classList.remove('spinning');
}

// player bar 控制
pbPlay.addEventListener('click', () => {
  if (currentTrackIdx < 0) return;

    stopProgress();

});

pbPrev.addEventListener('click', () => {
  const j = prevIdx(currentTrackIdx);
  if (j < 0) return;
  loadTrack(j, true);
  if (isVip(TRACKS[j])) showVipPop();
  else playCurrent();
});

pbNext.addEventListener('click', () => {
  const j = nextIdx(currentTrackIdx);
  if (j < 0) return;
  loadTrack(j, true);
  if (isVip(TRACKS[j])) showVipPop();
  else playCurrent();
});

// 用当前曲目加载播放器并出声（仅在用户手势栈内调用）
function playCurrent() {
  if (currentTrackIdx < 0) return;
  const track = TRACKS[currentTrackIdx];
  if (isVip(track)) { showVipPop(); return; }
  fcEmbed.src = `https://music.163.com/outchain/player?type=2&id=${track.id}&auto=1&height=66&_t=${Date.now()}`;
  setPlayingUI(true);
  startProgress();
}

// 播完自动续播：单曲循环→重播本首；否则按 nextIdx 切下一首；off 到末尾则停。
// 注意：这是从计时器触发（非用户手势），同标签页内 iframe 已解锁音频，
// 续播一般能继续出声；若浏览器拦截自动播放，用户点一下播放即可恢复。
function advanceNext() {
  setPlayingUI(false);
  if (loopMode === 'one') {
    // 单曲循环：重头再播本首（若本首付费则弹窗）
    if (isVip(TRACKS[currentTrackIdx])) { showVipPop(); return; }
    playCurrent();
    return;
  }
  const j = nextIdx(currentTrackIdx);
  if (j < 0) return;   // loop=off 且已到末尾 → 停
  loadTrack(j, true);
  // 让镜头也飞到下一张卡，视觉跟随
  const mesh = meshes.find(m => m.userData.track && m.userData.track.id === TRACKS[j].id);
  if (mesh) {
    focusedMesh = mesh;
    const p = mesh.position;
    flyTarget = { x: camX + (p.x-camX)*0.6, y: camY + (p.y-camY)*0.6, z: Math.max(p.z + 9, camZ - 22) };
  }
  if (isVip(TRACKS[j])) showVipPop();
  else playCurrent();
}

// 上一首/下一首：受循环模式影响（loopMode: 'list' | 'one' | 'off'；shuffle 独立）
let shuffleOn = false;
let loopMode = 'list';   // list=列表循环, one=单曲循环, off=播完即止
function nextIdx(from) {
  if (from < 0) return 0;
  if (shuffleOn) { let r; do { r = Math.floor(Math.random()*TRACKS.length); } while (TRACKS.length>1 && r===from); return r; }
  if (loopMode === 'one') return from;
  if (from < TRACKS.length - 1) return from + 1;
  return loopMode === 'list' ? 0 : -1;
}
function prevIdx(from) {
  if (from < 0) return 0;
  if (shuffleOn) { let r; do { r = Math.floor(Math.random()*TRACKS.length); } while (TRACKS.length>1 && r===from); return r; }
  if (from > 0) return from - 1;
  return loopMode === 'list' ? TRACKS.length - 1 : -1;
}

// ═══════════════════════════════════════════════════════════
// 历史歌单（默认墙 + 上传过的，去重，最近在前，上限 8）
// 默认墙作为第一条常驻：id='default'，点它=恢复默认墙
// ═══════════════════════════════════════════════════════════
const HISTORY_KEY = 'muzic_history_v1';
const DEFAULT_ENTRY = { id: 'default', name: '治愈系歌单', count: 78, cover: '' };

function readHistory() {
  try {
    const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function writeHistory(arr) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, 8))); } catch {}
}
function pushHistory(entry) {
  let arr = readHistory().filter(e => e.id !== entry.id);
  arr.unshift(entry);
  writeHistory(arr);
}

// 当前活跃歌单 id（default 或网易云歌单 id）
function currentPlaylistId() {
  try {
    const c = localStorage.getItem(PLAYLIST_CACHE_KEY);
    if (!c) return 'default';
    return JSON.parse(c).id || 'default';
  } catch { return 'default'; }
}

function renderHistory() {
  const box = document.getElementById('pp-history');
  if (!box) return;
  const curId = currentPlaylistId();
  // 默认墙常驻置顶 + 去重后的上传历史
  const hist = readHistory().filter(e => e.id !== 'default');
  const list = [DEFAULT_ENTRY, ...hist];
  box.innerHTML = '';
  list.forEach(e => {
    const row = document.createElement('div');
    row.className = 'pp-hist' + (String(e.id) === String(curId) ? ' active' : '');
    const ic = e.cover
      ? `<div class="pp-hist-ic"><img src="${e.cover}" alt=""></div>`
      : `<div class="pp-hist-ic">${e.id === 'default' ? '♪' : '♫'}</div>`;
    row.innerHTML = ic +
      `<div class="pp-hist-meta"><div class="pp-hist-name">${e.name}</div>` +
      `<div class="pp-hist-sub">${e.count} 首${e.id === 'default' ? ' · 默认' : ''}</div></div>`;
    row.addEventListener('click', () => switchToHistory(e));
    box.appendChild(row);
  });
}

// 点历史项 → 切歌单（默认墙清缓存；其它项重新载入该 id 再 reload）
function switchToHistory(e) {
  if (String(e.id) === String(currentPlaylistId())) { togglePlaylist(false); return; }
  if (e.id === 'default') {
    localStorage.removeItem(PLAYLIST_CACHE_KEY);
    setMsg('正在切回默认墙…', 'ok');
    setTimeout(() => location.reload(), 350);
    return;
  }
  // 重新拉该歌单（数据可能没存全，直接用 id 重载最稳）
  setMsg('正在切换…', 'ok');
  loadPlaylistById(e.id);
}

// ── 上传入口：粘链接 → /api/playlist → 反馈(含 VIP 数) → 存缓存+历史 → reload ──
const ppUrl = document.getElementById('pp-url');
const ppLoad = document.getElementById('pp-load');
const ppMsg = document.getElementById('pp-upload-msg');
function setMsg(txt, kind) {
  if (!ppMsg) return;
  ppMsg.innerHTML = txt || '';
  ppMsg.className = kind || '';
}
async function doLoadPlaylist(query) {
  if (ppLoad) ppLoad.disabled = true;
  setMsg('载入中…', '');
  try {
    const resp = await fetch('/api/playlist?url=' + encodeURIComponent(query));
    const data = await resp.json();
    if (!resp.ok || !data.ok || !Array.isArray(data.tracks) || data.tracks.length === 0) {
      setMsg((data && data.hint) || (data && data.error) || '载入失败，换个链接试试', 'err');
      if (ppLoad) ppLoad.disabled = false;
      return;
    }
    const vips = data.tracks.filter(t => t.fee === 1 || t.fee === 4).length;
    // 成功反馈：歌单名 + 曲数 + VIP 数（+截断提示）(#2)
    let msg = `《${data.name}》载入成功 ✓<br>共 ${data.returned} 首`;
    if (vips > 0) msg += ` · 其中 VIP ${vips} 首`;
    if (data.truncated) msg += ` · 已截断到前 ${data.returned} 首`;
    msg += '，正在换墙…';
    setMsg(msg, 'ok');
    localStorage.setItem(PLAYLIST_CACHE_KEY, JSON.stringify({
      id: data.id, name: data.name, truncated: data.truncated, tracks: data.tracks,
    }));
    pushHistory({ id: String(data.id), name: data.name, count: data.returned, cover: data.coverImgUrl || '' });
    setTimeout(() => location.reload(), 900);
  } catch (e) {
    setMsg('网络或接口异常，稍后再试', 'err');
    if (ppLoad) ppLoad.disabled = false;
  }
}
function loadPlaylistFromUrl() {
  const raw = (ppUrl?.value || '').trim();
  if (!raw) { setMsg('先粘一个网易云歌单链接', 'err'); return; }
  doLoadPlaylist(raw);
}
function loadPlaylistById(id) { doLoadPlaylist(String(id)); }
ppLoad?.addEventListener('click', loadPlaylistFromUrl);
ppUrl?.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadPlaylistFromUrl(); });


// ═══════════════════════════════════════════════════════════
// RAYCASTER  (selection + hover)
// ═══════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const pointer   = new THREE.Vector2();
let mdX = 0, mdY = 0;
document.addEventListener('mousedown', e => { mdX = e.clientX; mdY = e.clientY; });
document.addEventListener('mouseup', e => {
  if (e.target.closest('#focus-card') || e.target.closest('#toolbar') || e.target.closest('#player-bar') || e.target.closest('#playlist-panel') || e.target.closest('#hud-user') || e.target.closest('#lyrics-panel')) return;
  if (Math.hypot(e.clientX-mdX, e.clientY-mdY) > 6) return;
  pointer.x =  (e.clientX/window.innerWidth)*2 - 1;
  pointer.y = -(e.clientY/window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length) {
    focusedMesh = hits[0].object;
    triggerPunch(hits[0].object);   // 选中"按一下"反馈
    enterFocus(hits[0].object.userData.track);
  } else if (focusMode) {
    exitFocus();
  }
});

// ── 悬停反馈：光标变 pointer + 卡片轻微放大；选中时"按一下"动画 ──
let hoveredMesh = null;
let punchMesh = null, punchT = 0;
function triggerPunch(mesh) { punchMesh = mesh; punchT = 0; }

let _hoverMX = -1, _hoverMY = -1;
document.addEventListener('mousemove', e => {
  _hoverMX = e.clientX; _hoverMY = e.clientY;
});
function updateHover() {
  if (_hoverMX < 0 || dragging) { return; }
  pointer.x =  (_hoverMX/window.innerWidth)*2 - 1;
  pointer.y = -(_hoverMY/window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  const hit = hits.length ? hits[0].object : null;
  hoveredMesh = hit;
  document.body.classList.toggle('hover-card', !!hit);
}
function updateCardFX() {
  for (let i = 0; i < meshes.length; i++) {
    const m = meshes[i];
    if (m === focusedMesh) continue;
    if (m === playingMesh && _fxPulse > 0.01) continue;   // 播放中的卡由下方脉动接管(#4)
    let target = m.userData.baseScale;
    if (m === hoveredMesh) target *= 1.08;           // 悬停放大
    // 选中"按一下"：先弹大再回落
    if (m === punchMesh) {
      const k = Math.sin(Math.min(1, punchT) * Math.PI);  // 0→1→0
      target *= (1 + 0.22 * k);
    }
    const cur = m.scale.x;
    m.scale.setScalar(cur + (target - cur) * 0.25);   // 平滑过渡
  }
  if (punchMesh) { punchT += 0.06; if (punchT >= 1) punchMesh = null; }

  const st = performance.now() * 0.001;
  const beat = 0.5 + 0.5 * Math.sin(st * 3.0);

  // 聚焦卡：播放时随伪节奏轻微脉动放大（不模糊——只是缩放贴图）
  if (focusedMesh) {
    const pulseScale = focusedMesh.userData.baseScale * (1.18 + 0.10 * beat * _fxPulse);
    const cur = focusedMesh.scale.x;
    focusedMesh.scale.setScalar(cur + (pulseScale - cur) * 0.2);
  }

  // 关焦点卡后：背景墙里正在播放的卡保持脉动放大，明确"选中态"(#4)
  // （配合背后光场，整张卡视觉上明显被点亮、在动）
  if (playingMesh && playingMesh !== focusedMesh && _fxPulse > 0.01) {
    const pulseScale = playingMesh.userData.baseScale * (1.0 + (0.12 + 0.08 * beat) * _fxPulse);
    const cur = playingMesh.scale.x;
    playingMesh.scale.setScalar(cur + (pulseScale - cur) * 0.2);
  }
}

// Double-click: fly toward card
document.addEventListener('dblclick', e => {
  if (e.target.closest('#focus-card')) return;
  pointer.x =  (e.clientX/window.innerWidth)*2 - 1;
  pointer.y = -(e.clientY/window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length) {
    const p = hits[0].object.position;
    const STEP = 22;
    const targetZ = Math.max(p.z + 9, camZ - STEP);
    flyTarget = {
      x: camX + (p.x - camX) * 0.5,
      y: camY + (p.y - camY) * 0.5,
      z: targetZ
    };
  }
});

// ═══════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════
// ── 播放视觉 FX 状态 ──
let _fxPulse = 0;        // 0=未播放静止, →1 播放律动满
let _fxScale = 0;        // 光场当前尺寸（平滑）
const fcFx = document.getElementById('fc-fx');
let _coverPulseVal = 0;  // 封面碎片律动强度（平滑）
// 焦点卡碎片律动强度：播放中拉满，暂停回落到 0（碎片归位=静态封面）
function _coverPulse() {
  const target = (isPlaying && focusMode) ? 1 : 0;
  _coverPulseVal += (target - _coverPulseVal) * 0.06;
  return _coverPulseVal;
}
// 伪节奏：本地计时 playElapsed 驱动的复合正弦，模拟有起伏的节拍
function updateMusicFX(st) {
  // 目标律动强度：只要在播放就亮（不依赖焦点卡是否打开）(#4)
  const active = isPlaying && playingMesh;
  const target = active ? 1 : 0;
  _fxPulse += (target - _fxPulse) * 0.05;

  // 颜色平滑过渡到当前封面主色
  fxColor.lerp(fxColorTarget, 0.04);
  // 星空整体染上封面色（播放越强染得越明显），不播时回到白
  starMat.color.copy(_defaultStarColor).lerp(fxColor, 0.55 * _fxPulse);
  glowMat.color.copy(fxColor);
  glowMat2.color.copy(fxColor);

  if (_fxPulse < 0.01 && !active) {
    glowMat.opacity = 0; glowMat2.opacity = 0;
    return;
  }

  // 伪节奏脉冲：两个不同频率正弦叠加，做出"有节拍起伏"的呼吸
  const beat = 0.5 + 0.5 * Math.sin(st * 3.0);              // 主拍 ~0.48s
  const sub  = 0.5 + 0.5 * Math.sin(st * 1.3 + 1.0);        // 副波
  const pulse = (beat * 0.7 + sub * 0.3);

  // 光场跟随当前播放卡位置（关焦点卡后仍亮在背景墙那张卡上#4）
  const lightMesh = playingMesh || focusedMesh;
  if (lightMesh) {
    const p = lightMesh.position;
    glowSprite.position.set(p.x, p.y, p.z - 1.5);
    glowSprite2.position.set(p.x, p.y, p.z - 2.5);
  }

  // 尺寸 + 透明度随脉冲律动（动效明显）
  const baseSize = 26;
  const sizeWobble = baseSize * (0.82 + 0.30 * pulse) * _fxPulse;
  _fxScale += (sizeWobble - _fxScale) * 0.18;
  glowSprite.scale.set(_fxScale, _fxScale, 1);
  glowSprite2.scale.set(_fxScale * 1.7, _fxScale * 1.7, 1);
  glowMat.opacity  = (0.30 + 0.32 * pulse) * _fxPulse;
  glowMat2.opacity = (0.12 + 0.18 * pulse) * _fxPulse;
}

function animate() {
  requestAnimationFrame(animate);
  const _t = performance.now() * 0.001;
  updateBreath(_t);   // #11 卡片呼吸（focus 卡已排除）
  updateHover();      // 悬停检测（光标 + 放大目标）
  updateCardFX();     // 平滑应用 hover / 选中动画

  // 封面碎片动效(#5)：仅焦点卡打开时渲染；幅度 = 播放律动。
  // 暂停/未播时 pulse→0，碎片回到 home 网格（即静态封面），随后隐藏画布。
  if (focusMode) {
    const drew = coverFX.render(_t, _coverPulse());
    fcFx && fcFx.classList.toggle('on', drew);
  } else if (fcFx) {
    fcFx.classList.remove('on');
  }

  // Camera fly-to
  if (flyTarget) {
    camX += (flyTarget.x - camX) * .12;
    camY += (flyTarget.y - camY) * .12;
    camZ += (flyTarget.z - camZ) * .12;
    if (Math.abs(flyTarget.z - camZ) < .05) flyTarget = null;
  } else if (!dragging) {
    camX += velX; camY += velY;
    velX *= .88; velY *= .88;
    if (Math.abs(velX) < .001) velX = 0;
    if (Math.abs(velY) < .001) velY = 0;
  }

  // ── 软边界宇宙：越界橡皮筋回弹，永不黑边、永不过近变糊 ──
  const Z_MIN = -68, Z_MAX = 14;     // 近/远边界（防糊近界 + 防空旷远界）
  const X_LIM = 40, Y_LIM = 22;      // 拖拽边界
  const PULL = 0.08;                 // 回弹力度
  if (camZ < Z_MIN) camZ += (Z_MIN - camZ) * PULL;
  if (camZ > Z_MAX) camZ += (Z_MAX - camZ) * PULL;
  if (camX < -X_LIM) camX += (-X_LIM - camX) * PULL;
  if (camX >  X_LIM) camX += ( X_LIM - camX) * PULL;
  if (camY < -Y_LIM) camY += (-Y_LIM - camY) * PULL;
  if (camY >  Y_LIM) camY += ( Y_LIM - camY) * PULL;

  applyCamera();
  updateDepth();
  updateBillboard();
  updateLabels();

  // Render: DOF composer or plain fallback
  renderer.clear();
  if (USE_DOF) {
    composer.render();
  } else {
    // ── 星空闪烁（辉光 sprite + 整体明暗呼吸 + 局部抖动）#10 ──
    const st = performance.now() * 0.001;

    // ── 播放视觉 FX：色光场(A) + 星空响应(B) ──
    updateMusicFX(st);

    // 播放时星空脉动更明显（_fxPulse: 0→静止基线, 1→满播放律动）
    starMat.opacity = 0.70 + (0.25 + 0.22 * _fxPulse) * Math.sin(st * (1.2 + 1.0 * _fxPulse));
    starMat.size = 1.05 + (0.18 + 0.35 * _fxPulse) * Math.sin(st * (2.3 + 1.4 * _fxPulse));
    const starPosArr = starGeo.attributes.position.array;
    const slice = Math.floor(STAR_N / 8);
    const base = Math.floor(st * 30) % 8 * slice;
    for (let i = base; i < base + slice && i < STAR_N; i++) {
      starPosArr[i*3+1] += (Math.random() - 0.5) * 0.004;
    }
    starGeo.attributes.position.needsUpdate = true;

    // ── 流星（亮拖尾 + 发光头）#10 ──
    for (const mt of meteors) {
      if (!mt.active) {
        mt.nextAt -= 0.016;
        if (mt.nextAt <= 0) { mt.reset(); mt.nextAt = 3 + Math.random() * 6; }
        continue;
      }
      mt.t += 0.016 / mt.duration;
      if (mt.t >= 1) { mt.active = false; mt.mesh.material.opacity = 0; mt.head.material.opacity = 0; continue; }
      const head = mt.t;
      const tail = Math.max(0, mt.t - mt.len);
      const pts = mt.mesh.geometry.attributes.position.array;
      const hx = mt.ox + mt.dx * head, hy = mt.oy + mt.dy * head, hz = mt.oz + mt.dz * head;
      pts[0] = hx; pts[1] = hy; pts[2] = hz;
      pts[3] = mt.ox + mt.dx * tail; pts[4] = mt.oy + mt.dy * tail; pts[5] = mt.oz + mt.dz * tail;
      mt.mesh.geometry.attributes.position.needsUpdate = true;
      const fade = mt.t < 0.1 ? mt.t / 0.1 : mt.t > 0.8 ? (1 - mt.t) / 0.2 : 1;
      mt.mesh.material.opacity = 1.0 * fade;
      mt.head.position.set(hx, hy, hz);
      mt.head.material.opacity = 0.95 * fade;
    }

    renderer.render(scene, camera);
  }
}
animate();

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const W2 = window.innerWidth, H2 = window.innerHeight;
  camera.aspect = W2 / H2;
  camera.updateProjectionMatrix();
  renderer.setSize(W2, H2);
  composer.setSize(W2, H2);
});
</script>
